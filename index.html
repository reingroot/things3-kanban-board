<script src="lib.js"></script>
<script>
  const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  const API = '';  // same origin — server.py proxies to things-api
  const POLL_MS = 30_000;
  const DROP_BUFFER_MS = 2000;

  const COLS = ['inbox', 'someday', 'anytime', 'today'];

  let logbookUuids = new Set();

  let dragActive = false;
  let lastDropTime = 0;
  let dragEl = null;
  let dragSourceCol = null;

  let selectedProject = localStorage.getItem('selectedProject') || null;  // null = All, 'inbox', 'other', or project UUID
  if (selectedProject === '') selectedProject = null;
  function setSelectedProject(v) { selectedProject = v; localStorage.setItem('selectedProject', v ?? ''); }
  let currentIndex = null;

  let assignOpenId = null;
  let assignActiveWhen = 'anytime';
  let assignCloseTimer = null;
  let lastColData = null;
  let logbookFull = [];

  let focusModeActive = false;
  let focusState = JSON.parse(localStorage.getItem('focusState') || 'null');
  let focusPickerSelected = [null, null];

  let reviewActive = false;
  let reviewKanbanState = null;   // { inbox:[], today:[], next:[], someday:[] } while active
  let rDragTask = null;           // task object being dragged within review board
  let rDragSourceCol = null;      // col string of the drag source
  let activeProjectPicker = null;

  // ── Fetch ────────────────────────────────────────────────────────────────


  async function fetchLogbook() {
    try {
      const r = await fetch(`${API}/logbook`);
      if (!r.ok) return;
      const data = await r.json();
      logbookUuids = new Set(data.map(t => t.uuid));
      logbookFull = data;
    } catch (e) { /* non-fatal */ }
  }

  async function fetchCol(col) {
    const r = await fetch(`${API}/${col}`);
    if (!r.ok) throw new Error(`${col}: ${r.status}`);
    return r.json();
  }

  async function fetchAll() {
    const [inbox, someday, anytime, today] = await Promise.all(
      COLS.map(c => fetchCol(c))
    );
    return { inbox, someday, anytime, today };
  }

  // ── Index ─────────────────────────────────────────────────────────────────

  function buildIndex(inbox, someday, anytime, today) {
    const colData = { inbox, someday, anytime, today };

    // Today takes priority — build its UUID set so other columns can skip duplicates
    const todayUuids = new Set(
      (colData.today || []).filter(t => t.type === 'to-do').map(t => t.uuid)
    );

    // Build lookup maps scanning all items across all columns
    const projectMap = new Map();  // projectUuid → { uuid, title, area, area_title }
    const headingMap = new Map();  // headingUuid → { uuid, title, project }
    const areaOrder = [];
    const areaSet = new Set();

    for (const tasks of Object.values(colData)) {
      for (const t of tasks) {
        if (t.type === 'project') {
          if (!projectMap.has(t.uuid)) {
            projectMap.set(t.uuid, { uuid: t.uuid, title: t.title, area: t.area, area_title: t.area_title });
          }
          if (t.area && !areaSet.has(t.area)) {
            areaSet.add(t.area);
            areaOrder.push({ uuid: t.area, title: t.area_title });
          }
        } else if (t.type === 'heading') {
          if (!headingMap.has(t.uuid)) {
            headingMap.set(t.uuid, { uuid: t.uuid, title: t.title, project: t.project });
          }
        }
      }
    }

    // Bucket todos per column
    const byCol = {};
    for (const col of COLS) {
      byCol[col] = {
        inbox: [],
        projects: new Map(),  // projectUuid → { project, noHeading: [], headings: Map }
        other: new Map()      // areaUuid → { area, todos: [] }
      };
    }

    for (const col of COLS) {
      const bucket = byCol[col];
      for (const t of colData[col]) {
        if (t.type !== 'to-do') continue;
        if (isLogbookContamination(t, logbookUuids)) continue;
        if (isDuplicatedInToday(t, col, todayUuids)) continue;
        if (isGhostRecurring(t, col)) continue;

        if (!t.heading && !t.project && !t.area) {
          bucket.inbox.push(t);
          continue;
        }

        if (!t.heading && !t.project && t.area) {
          // Area-direct, no project
          if (!bucket.other.has(t.area)) {
            bucket.other.set(t.area, { area: { uuid: t.area, title: t.area_title }, todos: [] });
          }
          bucket.other.get(t.area).todos.push(t);
          continue;
        }

        // Has project directly or via heading
        let projectUuid = t.project || null;
        const headingUuid = t.heading || null;

        if (headingUuid && !projectUuid) {
          const h = headingMap.get(headingUuid);
          projectUuid = h ? h.project : null;
        }

        if (!projectUuid) {
          if (headingUuid) {
            // Heading not resolvable via API (no start date) — group by heading_title
            const syntheticKey = '_unresolved_' + headingUuid;
            if (!bucket.projects.has(syntheticKey)) {
              bucket.projects.set(syntheticKey, {
                project: { uuid: syntheticKey, title: t.heading_title || t.project_title || '?' },
                noHeading: [],
                headings: new Map()
              });
            }
            bucket.projects.get(syntheticKey).noHeading.push(t);
            continue;
          }
          bucket.inbox.push(t);
          continue;
        }

        const knownProject = projectMap.get(projectUuid);

        if (!bucket.projects.has(projectUuid)) {
          const project = knownProject || { uuid: projectUuid, title: t.project_title || '?', area: t.area, area_title: t.area_title };
          bucket.projects.set(projectUuid, { project, noHeading: [], headings: new Map() });
        }

        const proj = bucket.projects.get(projectUuid);

        if (headingUuid) {
          if (!proj.headings.has(headingUuid)) {
            const heading = headingMap.get(headingUuid) || { uuid: headingUuid, title: t.heading_title || '?' };
            proj.headings.set(headingUuid, { heading, todos: [] });
          }
          proj.headings.get(headingUuid).todos.push(t);
        } else {
          proj.noHeading.push(t);
        }
      }
    }

    // Build sidebar (only sections/projects with todos in any column)
    const projectsWithTodos = new Set();
    for (const col of COLS) {
      for (const uuid of byCol[col].projects.keys()) projectsWithTodos.add(uuid);
    }

    const sidebar = [];

    const hasInbox = COLS.some(col => byCol[col].inbox.length > 0);
    if (hasInbox) sidebar.push({ type: 'inbox' });

    for (const area of areaOrder) {
      const projects = [...projectMap.values()].filter(p => p.area === area.uuid && projectsWithTodos.has(p.uuid));
      if (projects.length > 0) {
        sidebar.push({ type: 'area', uuid: area.uuid, title: area.title, projects });
      }
    }

    const hasOther = COLS.some(col => byCol[col].other.size > 0);
    if (hasOther) sidebar.push({ type: 'other' });

    // Per-project heading list for the assignment panel
    const projectHeadings = new Map();
    for (const [, h] of headingMap) {
      if (h.project) {
        if (!projectHeadings.has(h.project)) projectHeadings.set(h.project, []);
        projectHeadings.get(h.project).push({ uuid: h.uuid, title: h.title });
      }
    }

    return { sidebar, byCol, projectHeadings, projectMap };
  }

  // ── Render: sidebar ───────────────────────────────────────────────────────

  function renderSidebar(index) {
    const nav = document.getElementById('sidebar');
    nav.innerHTML = '';

    const allBtn = document.createElement('div');
    allBtn.className = 'sidebar-all' + (selectedProject === null ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', () => { setSelectedProject(null); renderAll(); });
    nav.appendChild(allBtn);

    for (const item of index.sidebar) {
      if (item.type === 'inbox') {
        nav.appendChild(makeSidebarItem('Inbox', 'inbox'));

      } else if (item.type === 'area') {
        const label = document.createElement('div');
        label.className = 'sidebar-area';
        label.textContent = item.title;
        nav.appendChild(label);

        for (const project of item.projects) {
          nav.appendChild(makeSidebarProjectItem(project, index.projectHeadings));
        }

      } else if (item.type === 'other') {
        nav.appendChild(makeSidebarItem('Other', 'other'));
      }
    }

    setupSidebarAssign(nav);
  }

  function makeSidebarItem(label, id) {
    const row = document.createElement('div');
    row.className = 'sidebar-item' + (selectedProject === id ? ' active' : '');
    row.textContent = label;
    row.addEventListener('click', () => { setSelectedProject(id); renderAll(); });
    return row;
  }

  function makeSidebarProjectItem(project, projectHeadings) {
    const wrap = document.createElement('div');
    wrap.className = 'sidebar-proj-wrap';
    wrap.dataset.projectId = project.uuid;

    const row = document.createElement('div');
    row.className = 'sidebar-item' + (selectedProject === project.uuid ? ' active' : '');
    row.textContent = project.title;
    row.addEventListener('click', () => { setSelectedProject(project.uuid); renderAll(); });
    wrap.appendChild(row);

    // Assignment panel
    const panel = document.createElement('div');
    panel.className = 'assign-panel';
    const inner = document.createElement('div');
    inner.className = 'assign-panel-inner';

    // When selector
    const whenLabel = document.createElement('div');
    whenLabel.className = 'assign-sub-label';
    whenLabel.textContent = 'Move to';
    inner.appendChild(whenLabel);

    const whenRow = document.createElement('div');
    whenRow.className = 'assign-when-row';
    for (const w of ['someday', 'anytime', 'today']) {
      const btn = document.createElement('div');
      btn.className = 'assign-when-btn' + (w === 'anytime' ? ' sel' : '');
      btn.dataset.when = w;
      btn.textContent = w === 'someday' ? 'Someday' : w === 'anytime' ? 'Next' : 'Today';
      btn.addEventListener('dragenter', e => {
        e.preventDefault();
        e.stopPropagation();
        clearTimeout(assignCloseTimer);
        assignActiveWhen = w;
        whenRow.querySelectorAll('.assign-when-btn').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
      });
      btn.addEventListener('dragover', e => e.preventDefault());
      btn.addEventListener('drop', e => e.preventDefault());
      whenRow.appendChild(btn);
    }
    inner.appendChild(whenRow);

    // Heading zones
    const hdLabel = document.createElement('div');
    hdLabel.className = 'assign-sub-label';
    hdLabel.textContent = 'Under heading';
    inner.appendChild(hdLabel);

    const headings = projectHeadings.get(project.uuid) || [];
    const zones = [{ uuid: null, title: '(no heading)' }, ...headings];
    const whenOverClass = { someday: 'az-s', anytime: 'az-n', today: 'az-t' };

    const zoneList = document.createElement('div');
    zoneList.className = 'assign-heading-list';
    inner.appendChild(zoneList);

    for (const h of zones) {
      const zone = document.createElement('div');
      zone.className = 'assign-heading-zone';
      zone.innerHTML = `<span class="az-arrow">→</span><span>${esc(h.title)}</span>`;
      zone.dataset.headingUuid = h.uuid || '';
      zone.dataset.headingTitle = h.title;
      zone.dataset.projectUuid = project.uuid;

      zone.addEventListener('dragenter', e => {
        e.preventDefault();
        e.stopPropagation();
        clearTimeout(assignCloseTimer);
        zone.classList.add(whenOverClass[assignActiveWhen]);
      });
      zone.addEventListener('dragleave', e => {
        if (!zone.contains(e.relatedTarget))
          zone.classList.remove('az-s', 'az-n', 'az-t');
      });
      zone.addEventListener('dragover', e => e.preventDefault());
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('az-s', 'az-n', 'az-t');
        const taskId = e.dataTransfer.getData('taskId');
        if (!taskId) return;

        // Optimistic: remove card from its column
        const card = document.querySelector(`.card[data-id="${taskId}"]`);
        const cardTitle = card ? card.querySelector('.card-title')?.textContent : taskId;
        if (card) card.remove();
        lastDropTime = Date.now();
        dragActive = false;
        closeAssignPanel();
        showAssignToast(cardTitle, project.title, h.title, assignActiveWhen);

        const body = { list_id: project.uuid, when: assignActiveWhen };
        if (h.uuid) body.heading_id = h.uuid;

        fetch(`/todos/${encodeURIComponent(taskId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(r => {
          if (!r.ok) r.text().then(t => console.error('Assign failed:', r.status, t));
          else setTimeout(reload, 800);
        }).catch(err => console.error('Assign failed:', err));
      });

      zoneList.appendChild(zone);
    }

    panel.appendChild(inner);
    wrap.appendChild(panel);
    return wrap;
  }

  function openAssignPanel(projectId) {
    if (assignOpenId === projectId) { clearTimeout(assignCloseTimer); return; }
    closeAssignPanel();
    assignOpenId = projectId;
    assignActiveWhen = 'anytime';
    const wrap = document.querySelector(`.sidebar-proj-wrap[data-project-id="${projectId}"]`);
    if (!wrap) return;
    wrap.classList.add('assign-open');
    const panel = wrap.querySelector('.assign-panel');
    if (panel) {
      const rect = wrap.getBoundingClientRect();
      panel.style.top = rect.bottom + 'px';
      panel.style.left = rect.left + 'px';
      panel.style.width = rect.width + 'px';
      panel.style.maxHeight = (window.innerHeight - rect.bottom - 8) + 'px';
      panel.classList.add('assign-panel-visible');
    }
    wrap.querySelectorAll('.assign-when-btn').forEach(b => {
      b.classList.toggle('sel', b.dataset.when === 'anytime');
    });
  }

  function closeAssignPanel() {
    if (!assignOpenId) return;
    const wrap = document.querySelector(`.sidebar-proj-wrap[data-project-id="${assignOpenId}"]`);
    if (wrap) {
      wrap.classList.remove('assign-open');
      const panel = wrap.querySelector('.assign-panel');
      if (panel) { panel.classList.remove('assign-panel-visible'); panel.style.cssText = ''; }
    }
    assignOpenId = null;
  }

  let assignToastTimer;
  function showAssignToast(cardTitle, projectTitle, headingTitle, when) {
    const el = document.getElementById('assign-toast');
    const whenCls = when === 'someday' ? 't-blue' : when === 'today' ? 't-orange' : 't-green';
    const whenLabel = when === 'someday' ? 'Someday' : when === 'today' ? 'Today' : 'Next';
    const dest = headingTitle === '(no heading)' ? projectTitle : `${projectTitle} / ${headingTitle}`;
    el.innerHTML = `<span class="${whenCls}">${esc(cardTitle)}</span> → ${esc(dest)} · <span class="${whenCls}">${whenLabel}</span>`;
    el.classList.add('show');
    clearTimeout(assignToastTimer);
    assignToastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Project picker (hover chip) ───────────────────────────────────────────

  function openProjectPicker(task, col, triggerEl) {
    closeProjectPicker();
    if (!currentIndex) return;

    // All projects known from the current data, preserving area order
    const allProjects = [];
    const seen = new Set();
    for (const [uuid, proj] of currentIndex.projectMap) {
      if (!seen.has(uuid)) { allProjects.push(proj); seen.add(uuid); }
    }
    if (allProjects.length === 0) return;

    const whenMap = { inbox: 'anytime', next: 'anytime', anytime: 'anytime', someday: 'someday', today: 'today' };
    const when = whenMap[col] || 'anytime';

    const picker = document.createElement('div');
    picker.className = 'proj-picker';
    activeProjectPicker = picker;

    // Search
    const srRow = document.createElement('div'); srRow.className = 'proj-picker-sr';
    const inp = document.createElement('input'); inp.placeholder = 'Search projects…';
    srRow.appendChild(inp); picker.appendChild(srRow);

    // Panels
    const panels = document.createElement('div'); panels.className = 'proj-picker-panels';
    const leftEl  = document.createElement('div'); leftEl.className  = 'proj-picker-left';
    const rightEl = document.createElement('div'); rightEl.className = 'proj-picker-right';
    panels.appendChild(leftEl); panels.appendChild(rightEl); picker.appendChild(panels);

    // Footer
    const footer = document.createElement('div'); footer.className = 'proj-picker-footer';
    footer.textContent = 'Hover a project · click a heading to assign';
    picker.appendChild(footer);

    let activeProj = null;

    function renderLeft(query) {
      const q = (query || '').toLowerCase();
      leftEl.innerHTML = '';
      const filtered = allProjects.filter(p => p.title.toLowerCase().includes(q));
      if (filtered.length === 0) {
        const none = document.createElement('div'); none.className = 'proj-picker-hint';
        none.textContent = 'No projects found'; leftEl.appendChild(none); return;
      }
      filtered.forEach(proj => {
        const headings = currentIndex.projectHeadings.get(proj.uuid) || [];
        const row = document.createElement('div'); row.className = 'proj-picker-proj';
        if (proj === activeProj) row.classList.add('active');
        const name = document.createElement('span'); name.className = 'proj-picker-proj-name';
        name.textContent = proj.title; row.appendChild(name);
        if (headings.length) {
          const arr = document.createElement('span'); arr.className = 'proj-picker-arrow';
          arr.textContent = '▶'; row.appendChild(arr);
        }
        row.addEventListener('mouseenter', () => activateProj(proj, row));
        row.addEventListener('click', () => {
          if (!headings.length) doProjectAssign(task, proj.uuid, null, when, proj.title, null);
        });
        leftEl.appendChild(row);
      });
    }

    function activateProj(proj, rowEl) {
      activeProj = proj;
      leftEl.querySelectorAll('.proj-picker-proj').forEach(r => r.classList.remove('active'));
      rowEl.classList.add('active');
      renderRight(proj);
      const headings = currentIndex.projectHeadings.get(proj.uuid) || [];
      footer.textContent = headings.length
        ? `Assigning to ${proj.title} — pick a heading`
        : `Click to assign directly to ${proj.title}`;
    }

    function renderRight(proj) {
      rightEl.innerHTML = '';
      const headings = currentIndex.projectHeadings.get(proj.uuid) || [];
      if (!headings.length) {
        const hint = document.createElement('div'); hint.className = 'proj-picker-hint';
        hint.textContent = 'No headings\nClick project name\nto assign';
        rightEl.appendChild(hint); return;
      }
      const noH = document.createElement('div'); noH.className = 'proj-picker-no-heading';
      noH.textContent = '— Top of project';
      noH.addEventListener('click', () => doProjectAssign(task, proj.uuid, null, when, proj.title, null));
      rightEl.appendChild(noH);
      const div = document.createElement('div'); div.className = 'proj-picker-hdiv';
      rightEl.appendChild(div);
      headings.forEach(h => {
        const it = document.createElement('div'); it.className = 'proj-picker-heading';
        it.textContent = h.title;
        it.addEventListener('click', () => doProjectAssign(task, proj.uuid, h.uuid, when, proj.title, h.title));
        rightEl.appendChild(it);
      });
    }

    // Initial empty right panel
    const hint = document.createElement('div'); hint.className = 'proj-picker-hint';
    hint.textContent = 'Hover a project\nto see headings';
    rightEl.appendChild(hint);

    renderLeft('');
    inp.addEventListener('input', () => { renderLeft(inp.value); });
    inp.addEventListener('keydown', e => { if (e.key === 'Escape') closeProjectPicker(); });

    // Position: below and right-aligned to trigger, clamp to viewport
    const rect = triggerEl.getBoundingClientRect();
    const pickerH = 290;
    let top  = rect.bottom + 6;
    let left = rect.right - 340;
    if (top + pickerH > window.innerHeight - 8) top = rect.top - pickerH - 6;
    if (left < 8) left = 8;
    if (left + 340 > window.innerWidth - 8) left = window.innerWidth - 348;
    picker.style.top  = Math.max(8, top) + 'px';
    picker.style.left = left + 'px';
    document.body.appendChild(picker);
    setTimeout(() => inp.focus(), 10);

    function outside(e) {
      if (!picker.contains(e.target) && e.target !== triggerEl) closeProjectPicker();
    }
    setTimeout(() => document.addEventListener('click', outside), 100);
    picker._outside = outside;
  }

  function closeProjectPicker() {
    if (!activeProjectPicker) return;
    if (activeProjectPicker._outside) document.removeEventListener('click', activeProjectPicker._outside);
    activeProjectPicker.remove();
    activeProjectPicker = null;
  }

  function doProjectAssign(task, projectUuid, headingUuid, when, projectTitle, headingTitle) {
    closeProjectPicker();
    const card = document.querySelector(`.card[data-id="${task.uuid}"]`);
    showAssignToast(task.title, projectTitle, headingTitle || '(no heading)', when);
    if (card) card.remove();
    lastDropTime = Date.now();

    const body = { list_id: projectUuid, when };
    if (headingUuid) body.heading_id = headingUuid;

    fetch(`/todos/${encodeURIComponent(task.uuid)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(r => {
      if (!r.ok) r.text().then(t => console.error('Assign failed:', r.status, t));
      else setTimeout(reload, 800);
    }).catch(err => console.error('Assign failed:', err));
  }

  function setupSidebarAssign(nav) {
    nav.querySelectorAll('.sidebar-proj-wrap').forEach(wrap => {
      wrap.addEventListener('dragenter', e => {
        e.preventDefault();
        clearTimeout(assignCloseTimer);
        openAssignPanel(wrap.dataset.projectId);
      });
      wrap.addEventListener('dragover', e => e.preventDefault());
    });

    nav.addEventListener('dragleave', e => {
      if (!nav.contains(e.relatedTarget)) {
        assignCloseTimer = setTimeout(closeAssignPanel, 300);
      }
    });
  }

  // ── Render: columns ───────────────────────────────────────────────────────

  function renderCol(col, index) {
    const container = document.getElementById(`cards-${col}`);
    container.innerHTML = '';

    const bucket = index.byCol[col];
    let totalCards = 0;

    if (selectedProject === null) {
      // All: group by project, sidebar order
      if (bucket.inbox.length > 0) {
        bucket.inbox.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

      // Sidebar-listed projects (have an area, appear in hierarchy)
      const renderedProjects = new Set();
      for (const sItem of index.sidebar) {
        if (sItem.type !== 'area') continue;
        for (const project of sItem.projects) {
          const group = bucket.projects.get(project.uuid);
          if (!group) continue;
          const todos = [...group.noHeading, ...[...group.headings.values()].flatMap(h => h.todos)];
          if (todos.length === 0) continue;
          container.appendChild(makeGroupHeader(project.title));
          todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
          renderedProjects.add(project.uuid);
        }
      }

      // Projects not in sidebar (no area or not returned by API — e.g. sub-projects)
      for (const [uuid, group] of bucket.projects) {
        if (renderedProjects.has(uuid)) continue;
        const todos = [...group.noHeading, ...[...group.headings.values()].flatMap(h => h.todos)];
        if (todos.length === 0) continue;
        container.appendChild(makeGroupHeader(group.project.title));
        todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

      for (const [, group] of bucket.other) {
        if (group.todos.length === 0) continue;
        container.appendChild(makeGroupHeader(`Other — ${group.area.title}`));
        group.todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

    } else if (selectedProject === 'inbox') {
      bucket.inbox.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });

    } else if (selectedProject === 'other') {
      for (const [, group] of bucket.other) {
        if (group.todos.length === 0) continue;
        container.appendChild(makeGroupHeader(group.area.title));
        group.todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

    } else {
      // Specific project: group by heading
      const group = bucket.projects.get(selectedProject);
      if (group) {
        group.noHeading.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
        for (const [, hGroup] of group.headings) {
          if (hGroup.todos.length === 0) continue;
          container.appendChild(makeGroupHeader(hGroup.heading.title));
          hGroup.todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
        }
      }
    }

    // Empty state
    if (totalCards === 0) {
      const msg = document.createElement('div');
      msg.className = 'empty-state';
      msg.textContent = selectedProject !== null ? 'No tasks in this filter' : 'No tasks';
      container.appendChild(msg);
    }

    // Count badge
    const count = document.getElementById(`count-${col}`);
    if (count) count.textContent = totalCards || '—';
    if (col === 'inbox') applyInboxUrgency(totalCards);
  }

  function makeGroupHeader(title) {
    const el = document.createElement('div');
    el.className = 'group-header';
    el.draggable = false;
    el.textContent = title;
    return el;
  }

  function renderAll() {
    if (!currentIndex) return;
    if (lastColData) updateStalenessTracking(lastColData);
    renderSidebar(currentIndex);
    COLS.forEach(col => renderCol(col, currentIndex));
    updateFocusBanner();
    if (focusModeActive) refreshFocusSwimlanes();
    updateReviewBadge();
  }

  // ── Card ──────────────────────────────────────────────────────────────────

  function makeCard(task, col) {
    if (!task.title) {
      const sep = document.createElement('div');
      sep.className = 'card-separator';
      return sep;
    }

    const el = document.createElement('div');
    el.className = 'card';
    el.draggable = true;
    el.dataset.id = task.uuid;
    el.dataset.col = col;

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = task.title;
    el.appendChild(title);

    if ((task.tags && task.tags.length > 0) || task.start_date || task.deadline) {
      const chips = document.createElement('div');
      chips.className = 'chips';

      if (task.tags) {
        task.tags.forEach(tag => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = tag;
          chips.appendChild(chip);
        });
      }

      if (task.start_date) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const d = new Date(task.start_date + 'T00:00:00');
        const opts = { day: 'numeric', month: 'short' };
        if (d.getFullYear() !== today.getFullYear()) opts.year = 'numeric';
        const chip = document.createElement('span');
        chip.className = 'chip chip-date';
        chip.textContent = d.toLocaleDateString('en-GB', opts);
        chips.appendChild(chip);
      }

      if (task.deadline) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const due = new Date(task.deadline + 'T00:00:00');
        const diff = Math.round((due - today) / 86400000);
        const chip = document.createElement('span');
        chip.className = 'chip chip-deadline';
        if (diff < 0)      chip.classList.add('overdue');
        else if (diff === 0) chip.classList.add('due-today');
        else if (diff <= 7)  chip.classList.add('due-soon');
        const opts = { day: 'numeric', month: 'short' };
        if (due.getFullYear() !== today.getFullYear()) opts.year = 'numeric';
        chip.textContent = due.toLocaleDateString('en-GB', opts);
        chips.appendChild(chip);
      }

      el.appendChild(chips);
    }

    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
    return el;
  }

  // ── Loading ───────────────────────────────────────────────────────────────

  function showLoading(col) {
    const container = document.getElementById(`cards-${col}`);
    container.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const el = document.createElement('div');
      el.className = 'loading-card';
      container.appendChild(el);
    }
  }

  // ── Load / Poll ───────────────────────────────────────────────────────────

  async function load(initial = false) {
    if (initial) {
      COLS.forEach(c => showLoading(c));
      await fetchLogbook();
    }
    try {
      const data = await fetchAll();
      lastColData = data;
      currentIndex = buildIndex(data.inbox, data.someday, data.anytime, data.today);
      setError(false);
      renderAll();
      if (initial) maybeShowBriefing();
    } catch (e) {
      setError(true);
    }
  }

  function reload() {
    setError(false);
    COLS.forEach(c => showLoading(c));
    load();
  }

  function tick() {
    if (dragActive) return;
    if (Date.now() - lastDropTime < DROP_BUFFER_MS) return;
    load();
  }

  // ── GTD Briefing ─────────────────────────────────────────────────────────

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function maybeShowBriefing() {
    if (localStorage.getItem('briefing-dismissed') === todayStr()) return;
    showBriefing();
  }

  function showBriefing() {
    const h = new Date().getHours();
    document.getElementById('b-timeofday').textContent = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
    document.getElementById('b-date-line').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    if (lastColData) renderBriefingContent(lastColData, logbookFull);
    document.getElementById('briefing-overlay').classList.add('visible');
  }

  function closeBriefing() {
    document.getElementById('briefing-overlay').classList.remove('visible');
    localStorage.setItem('briefing-dismissed', todayStr());
  }

  function renderBriefingContent(colData, logbook) {
    const now = new Date();
    const today = now.toISOString().slice(0, 10);
    const weekAgo = new Date(now - 7 * 864e5).toISOString().slice(0, 10);
    const monthAgo = new Date(now - 30 * 864e5).toISOString().slice(0, 10);
    const todos = arr => arr.filter(t => t.type === 'to-do');

    const inboxTodos  = todos(colData.inbox);
    const todayTodos  = todos(colData.today);
    const anyTodos    = todos(colData.anytime);
    const somedayTodos = todos(colData.someday);
    const log = todos(logbook);

    const overdueTasks = todayTodos.filter(t => t.deadline && t.deadline.slice(0, 10) < today);
    const dueSoonTasks = [...todayTodos, ...anyTodos].filter(t =>
      t.deadline && t.deadline.slice(0, 10) >= today && (new Date(t.deadline) - now) / 864e5 <= 7
    );

    const doneWeek  = log.filter(t => t.status === 'completed' && t.stop_date >= weekAgo).length;
    const doneMonth = log.filter(t => t.status === 'completed' && t.stop_date >= monthAgo).length;

    const todayProjects = new Set(todayTodos.map(t => t.project).filter(Boolean));
    const stalledMap = {};
    anyTodos.forEach(t => {
      if (t.project && !todayProjects.has(t.project))
        stalledMap[t.project_title || t.project] = (stalledMap[t.project_title || t.project] || 0) + 1;
    });
    const stalled = Object.entries(stalledMap).sort((a, b) => b[1] - a[1]);

    const sev = (val, lo, hi) => val <= lo ? 'green' : val <= hi ? 'amber' : 'red';
    const fmt = d => new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    const inboxSev  = sev(inboxTodos.length, 5, 15);
    const todaySev  = sev(todayTodos.length, 10, 20);
    const stalledSev = sev(stalled.length, 0, 3);
    const reflectSev = stalled.length === 0 && somedayTodos.length <= 20 ? 'green' : stalled.length > 3 || somedayTodos.length > 50 ? 'red' : 'amber';

    const inboxAction  = inboxTodos.length === 0 ? 'Inbox zero!' : inboxTodos.length <= 5 ? 'Looking good' : inboxTodos.length <= 15 ? 'Process soon' : 'Schedule inbox time';
    const todayAction  = todayTodos.length <= 10 ? 'Focused day ahead' : todayTodos.length <= 20 ? 'Busy but doable' : 'Consider deferring some';
    const reflectAction = somedayTodos.length <= 20 ? 'Someday healthy' : somedayTodos.length <= 50 ? 'Review someday list' : 'Prune someday list';

    const sections = [];

    // Capture
    sections.push(`
      <div class="b-section">
        <div class="b-section-header">
          <span class="b-badge b-badge-${inboxSev}">Capture</span>
          <span class="b-section-title">Inbox</span>
          <span class="b-section-status b-col-${inboxSev}">${inboxTodos.length} items</span>
        </div>
        <div class="b-section-body">
          <div class="b-metric-row">
            <div class="b-metric-icon" style="background:#2c2c2e">📥</div>
            <div class="b-metric-text">
              <div class="b-metric-value b-col-${inboxSev}">${inboxTodos.length}</div>
              <div class="b-metric-label">unprocessed items</div>
            </div>
            <span class="b-action b-action-${inboxSev}">${inboxAction}</span>
          </div>
        </div>
      </div>`);

    // Engage
    sections.push(`
      <div class="b-section">
        <div class="b-section-header">
          <span class="b-badge b-badge-blue">Engage</span>
          <span class="b-section-title">Today</span>
          <span class="b-section-status b-col-${todaySev}">${todayTodos.length} tasks</span>
        </div>
        <div class="b-section-body">
          <div class="b-metric-row">
            <div class="b-metric-icon" style="background:#1a2240">📅</div>
            <div class="b-metric-text">
              <div class="b-metric-value b-col-${todaySev}">${todayTodos.length}</div>
              <div class="b-metric-label">tasks scheduled for today</div>
            </div>
            <span class="b-action b-action-${todaySev}">${todayAction}</span>
          </div>
          ${overdueTasks.length ? `
          <div class="b-metric-row">
            <div class="b-metric-icon" style="background:#3d1a1a">⚠️</div>
            <div class="b-metric-text">
              <div class="b-metric-value b-col-red">${overdueTasks.length}</div>
              <div class="b-metric-label">overdue deadline${overdueTasks.length !== 1 ? 's' : ''}</div>
            </div>
            <span class="b-action b-action-red">Deal with these first</span>
          </div>
          <div class="b-task-list">${overdueTasks.slice(0, 4).map(t => `
            <div class="b-task-item">
              <div class="b-task-dot" style="background:#ff453a"></div>
              <span style="flex:1">${esc(t.title || '(untitled)')}</span>
              <span class="b-col-red" style="font-size:11px">${fmt(t.deadline)}</span>
            </div>`).join('')}</div>` : ''}
          ${dueSoonTasks.length ? `
          <div class="b-metric-row">
            <div class="b-metric-icon" style="background:#2e2200">🗓</div>
            <div class="b-metric-text">
              <div class="b-metric-value b-col-amber">${dueSoonTasks.length}</div>
              <div class="b-metric-label">due within 7 days</div>
            </div>
            <span class="b-action b-action-amber">Keep on radar</span>
          </div>` : ''}
        </div>
      </div>`);

    // Reflect
    sections.push(`
      <div class="b-section">
        <div class="b-section-header">
          <span class="b-badge b-badge-purple">Reflect</span>
          <span class="b-section-title">Weekly Review Health</span>
          <span class="b-section-status b-col-${reflectSev}">${reflectSev === 'green' ? 'Healthy' : reflectSev === 'amber' ? 'Needs attention' : 'Review overdue'}</span>
        </div>
        <div class="b-section-body">
          <div class="b-two">
            <div class="b-metric-row">
              <div class="b-metric-icon" style="background:#2e1a40">🌙</div>
              <div class="b-metric-text">
                <div class="b-metric-value b-col-${sev(somedayTodos.length, 20, 50)}">${somedayTodos.length}</div>
                <div class="b-metric-label">someday / maybe</div>
              </div>
            </div>
            <div class="b-metric-row">
              <div class="b-metric-icon" style="background:#2e2200">⏸</div>
              <div class="b-metric-text">
                <div class="b-metric-value b-col-${stalled.length > 0 ? 'amber' : 'green'}">${stalled.length}</div>
                <div class="b-metric-label">stalled projects</div>
              </div>
            </div>
          </div>
          ${stalled.length ? `<div class="b-task-list">${stalled.slice(0, 4).map(s => `
            <div class="b-task-item">
              <div class="b-task-dot"></div>
              <span style="flex:1">${esc(s[0])}</span>
              <span style="color:#636366;font-size:11px">${s[1]} tasks</span>
            </div>`).join('')}</div>` : ''}
          <div class="b-metric-row" style="margin-top:4px">
            <div class="b-metric-text"><div class="b-metric-label">Someday review status</div></div>
            <span class="b-action b-action-${sev(somedayTodos.length, 20, 50)}">${reflectAction}</span>
          </div>
        </div>
      </div>`);

    // Momentum
    const dailyAvg = (doneMonth / 30).toFixed(1);
    sections.push(`
      <div class="b-section">
        <div class="b-section-header">
          <span class="b-badge b-badge-green">Momentum</span>
          <span class="b-section-title">Completion Velocity</span>
          <span class="b-section-status b-col-green">${doneWeek} this week</span>
        </div>
        <div class="b-section-body">
          <div class="b-two">
            <div class="b-metric-row">
              <div class="b-metric-icon" style="background:#1a2e1a">✅</div>
              <div class="b-metric-text">
                <div class="b-metric-value b-col-green">${doneWeek}</div>
                <div class="b-metric-label">completed this week</div>
              </div>
            </div>
            <div class="b-metric-row">
              <div class="b-metric-icon" style="background:#1a2240">📈</div>
              <div class="b-metric-text">
                <div class="b-metric-value b-col-blue">${doneMonth}</div>
                <div class="b-metric-label">completed this month</div>
              </div>
            </div>
          </div>
          <div class="b-metric-row">
            <div class="b-metric-text"><div class="b-metric-label">Daily average (30 days)</div></div>
            <span class="b-action b-action-green">${dailyAvg} tasks / day</span>
          </div>
        </div>
      </div>`);

    document.getElementById('briefing-body').innerHTML = sections.join('');
  }

  // Close briefing on backdrop click (not modal click)
  document.getElementById('briefing-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('briefing-overlay')) closeBriefing();
  });

  function setError(isError) {
    const banner = document.getElementById('banner');
    const dot = document.getElementById('status-dot');
    banner.classList.toggle('visible', isError);
    dot.classList.toggle('error', isError);
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────────

  function onDragStart(e) {
    closeProjectPicker();
    dragActive = true;
    document.body.classList.add('is-dragging');
    dragEl = e.currentTarget;
    dragSourceCol = dragEl.dataset.col;
    if (dragSourceCol !== 'inbox') document.body.classList.add('is-dragging-from-other');
    e.dataTransfer.setData('taskId', dragEl.dataset.id);
    e.dataTransfer.setData('sourceCol', dragSourceCol);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => dragEl && dragEl.classList.add('dragging'), 0);
    if (dragSourceCol === 'today') showVerdictPanel();
    const rect = dragEl.getBoundingClientRect();
    const ghost = dragEl.cloneNode(true);
    ghost.classList.remove('dragging');
    ghost.style.cssText = `width:${rect.width}px;flex-shrink:0;opacity:0.85;padding-left:28px;position:relative;box-sizing:border-box;overflow:hidden;`;
    const handle = document.createElement('div');
    handle.style.cssText = `position:absolute;left:0;top:0;bottom:0;width:20px;display:flex;align-items:center;justify-content:center;color:#636366;font-size:11px;background:#2c2c2e;`;
    handle.textContent = '⠿';
    ghost.insertBefore(handle, ghost.firstChild);
    // 20px spacer + offsetX=30 places cursor at handle centre; ghost extends right of cursor
    const spacer = document.createElement('div');
    spacer.style.cssText = `width:20px;flex-shrink:0;`;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:fixed;top:-9999px;left:0;display:flex;align-items:flex-start;';
    wrapper.appendChild(spacer);
    wrapper.appendChild(ghost);
    document.body.appendChild(wrapper);
    e.dataTransfer.setDragImage(wrapper, 30, Math.min(e.offsetY, rect.height / 2));
    setTimeout(() => wrapper.remove(), 0);
  }

  function onDragEnd() {
    dragActive = false;
    document.body.classList.remove('is-dragging', 'is-dragging-from-other');
    if (dragEl) {
      dragEl.classList.remove('dragging');
      dragEl = null;
    }
    document.querySelectorAll('.column, .focus-col-cards').forEach(c => c.classList.remove('drag-over'));
    clearTimeout(assignCloseTimer);
    assignCloseTimer = setTimeout(closeAssignPanel, 150);
    hideVerdictPanel();
  }

  function setupColumn(colEl) {
    const isInbox = colEl.dataset.col === 'inbox';

    colEl.addEventListener('dragover', e => {
      if (isInbox) { e.preventDefault(); e.dataTransfer.dropEffect = 'none'; return; }
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colEl.classList.add('drag-over');
    });

    colEl.addEventListener('dragleave', e => {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over');
    });

    colEl.addEventListener('drop', e => {
      if (isInbox) return;
      e.preventDefault();
      colEl.classList.remove('drag-over');

      const taskId = e.dataTransfer.getData('taskId');
      const sourceCol = e.dataTransfer.getData('sourceCol');
      const targetCol = colEl.dataset.col;

      if (!taskId || sourceCol === targetCol) { dragActive = false; return; }

      // Optimistic DOM move
      const card = document.querySelector(`.card[data-id="${taskId}"]`);
      if (card) {
        const targetCards = colEl.querySelector('.cards');
        card.dataset.col = targetCol;
        targetCards.appendChild(card);
        updateCount(sourceCol);
        updateCount(targetCol);
      }

      lastDropTime = Date.now();
      dragActive = false;

      fetch(`/todos/${encodeURIComponent(taskId)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ when: targetCol })
      }).then(r => {
        if (!r.ok) r.text().then(t => console.error('Update failed:', r.status, t));
      }).catch(e => console.error('Update failed:', e));
    });
  }

  const INBOX_URGENCY = [
    { max: 2,  width: '140px', brightness: 0.80, ty: '12px', dot: '#3a3a3c', countColor: '#3a3a3c', countSize: '11px', countWeight: '600', badge: 'quiet',           badgeColor: '#3a3a3c', badgeBorder: '#3a3a3c' },
    { max: 5,  width: '190px', brightness: 0.88, ty: '8px',  dot: '#636366', countColor: '#48484a', countSize: '11px', countWeight: '600', badge: 'unprocessed',     badgeColor: '#48484a', badgeBorder: '#3a3a3c' },
    { max: 9,  width: '230px', brightness: 0.95, ty: '4px',  dot: '#ff9f0a', countColor: '#ff9f0a', countSize: '12px', countWeight: '700', badge: 'filling up',      badgeColor: '#ff9f0a', badgeBorder: '#7a4b00' },
    { max: Infinity, width: '270px', brightness: 1.00, ty: '0px', dot: '#ff453a', countColor: '#ff453a', countSize: '14px', countWeight: '700', badge: 'needs attention', badgeColor: '#ff453a', badgeBorder: '#7a1e1a' },
  ];

  function applyInboxUrgency(count) {
    const s = INBOX_URGENCY.find(tier => count <= tier.max);
    const section   = document.getElementById('inbox-section');
    const indicator = document.getElementById('inbox-indicator');
    const badge     = document.getElementById('inbox-badge');
    const countEl   = document.getElementById('count-inbox');
    if (!section) return;
    section.style.width     = s.width;
    section.style.filter    = `brightness(${s.brightness})`;
    section.style.transform = `translateY(${s.ty})`;
    if (indicator) indicator.style.background = s.dot;
    if (badge) { badge.textContent = s.badge; badge.style.color = s.badgeColor; badge.style.borderColor = s.badgeBorder; }
    if (countEl) { countEl.style.color = s.countColor; countEl.style.fontSize = s.countSize; countEl.style.fontWeight = s.countWeight; }
  }

  function updateCount(col) {
    const container = document.getElementById(`cards-${col}`);
    const count = document.getElementById(`count-${col}`);
    if (container && count) {
      const n = container.querySelectorAll('.card').length;
      count.textContent = n;
      if (col === 'inbox') applyInboxUrgency(n);
    }
  }

  // ── View Switching ────────────────────────────────────────────────────────

  function setView(viewName) {
    localStorage.setItem('activeView', viewName);
    focusModeActive = (viewName === 'focus');
    document.querySelectorAll('.view-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.view === viewName)
    );
    const content = document.querySelector('.content');
    const focusEl = document.getElementById('focus-container');
    const reviewEl = document.getElementById('review-container');

    content.style.display = (viewName === 'board') ? '' : 'none';

    if (viewName === 'focus') {
      focusEl.classList.add('visible');
      // CSS transitions don't fire on display:none→flex; double-rAF triggers the opacity fade
      focusEl.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => { focusEl.style.opacity = '1'; }));
      if (focusState && !focusIsStale(focusState)) showFocusSwimlanes();
      else showFocusPicker();
    } else {
      focusEl.classList.remove('visible');
    }

    reviewEl.style.display = (viewName === 'review') ? 'flex' : 'none';

    if (viewName === 'review' && !reviewActive) {
      reviewActive = true;
      initReviewBoard();
    }
    if (viewName !== 'review' && reviewActive) {
      reviewActive = false;
      reviewKanbanState = null;
      localStorage.setItem('lastReviewTimestamp', String(Date.now()));
      updateReviewBadge();
    }
  }

  function showFocusPicker() {
    document.getElementById('focus-picker').style.display = '';
    document.getElementById('focus-swimlanes').style.display = 'none';
    renderFocusPicker();
  }

  function showFocusSwimlanes() {
    document.getElementById('focus-picker').style.display = 'none';
    document.getElementById('focus-swimlanes').style.display = '';
    renderFocusSwimlanes();
  }

  function refreshFocusSwimlanes() {
    const swimlanesEl = document.getElementById('focus-swimlanes');
    if (!swimlanesEl || swimlanesEl.style.display === 'none') return;
    renderFocusSwimlanes();
  }

  function updateFocusBanner() {
    const banner = document.getElementById('focus-banner');
    const text = document.getElementById('focus-banner-text');
    if (!focusState || focusIsStale(focusState)) {
      banner.classList.remove('visible');
      return;
    }
    const names = focusState.projects.map(uuid => {
      if (!currentIndex) return uuid;
      for (const col of ['someday', 'anytime', 'today']) {
        const entry = currentIndex.byCol[col].projects.get(uuid);
        if (entry) return entry.project.title;
      }
      return uuid;
    });
    text.textContent = `Weekly focus: ${names.join(' & ')}`;
    banner.classList.add('visible');
  }

  function checkFocusBannerOnLoad() {
    if (focusState && focusIsStale(focusState)) {
      focusState = null;
      localStorage.removeItem('focusState');
    }
  }

  function renderFocusPicker() {
    if (!currentIndex) return;

    const projectMap = new Map();
    for (const col of ['someday', 'anytime', 'today']) {
      for (const [uuid, entry] of currentIndex.byCol[col].projects) {
        if (!projectMap.has(uuid)) projectMap.set(uuid, { project: entry.project, count: 0 });
        const e = projectMap.get(uuid);
        e.count += entry.noHeading.length;
        for (const h of entry.headings.values()) e.count += h.todos.length;
      }
    }
    const allProjects = [...projectMap.values()].sort((a, b) =>
      a.project.title.localeCompare(b.project.title)
    );

    if (focusState && !focusIsStale(focusState)) {
      focusPickerSelected = [focusState.projects[0] || null, focusState.projects[1] || null];
    } else {
      focusPickerSelected = [null, null];
    }

    const picker = document.getElementById('focus-picker');
    picker.innerHTML = '';

    const h2 = document.createElement('h2');
    h2.textContent = 'Choose your focus projects for this week';
    picker.appendChild(h2);

    const slots = document.createElement('div');
    slots.className = 'focus-picker-slots';

    const startBtn = document.createElement('button');
    startBtn.className = 'focus-picker-start';
    startBtn.textContent = 'Start focus week';
    startBtn.disabled = !focusPickerSelected[0] && !focusPickerSelected[1];
    startBtn.onclick = () => {
      const selected = focusPickerSelected.filter(Boolean);
      if (!selected.length) return;
      focusState = { weekOf: getWeekMonday(new Date()), projects: selected };
      localStorage.setItem('focusState', JSON.stringify(focusState));
      updateFocusBanner();
      showFocusSwimlanes();
    };

    for (let slot = 0; slot < 2; slot++) {
      const slotEl = document.createElement('div');
      slotEl.className = 'focus-picker-slot';

      const label = document.createElement('label');
      label.textContent = slot === 0 ? 'Project A' : 'Project B (optional)';
      slotEl.appendChild(label);

      const search = document.createElement('input');
      search.type = 'text';
      search.className = 'focus-picker-search';
      search.placeholder = 'Search projects…';
      slotEl.appendChild(search);

      const list = document.createElement('div');
      list.className = 'focus-picker-list';

      const renderOptions = (filter) => {
        const f = filter.toLowerCase();
        list.innerHTML = '';
        for (const { project } of allProjects) {
          if (f && !project.title.toLowerCase().includes(f)) continue;
          const opt = document.createElement('div');
          opt.className = 'focus-picker-option' + (focusPickerSelected[slot] === project.uuid ? ' selected' : '');
          opt.textContent = project.title;
          opt.onclick = () => {
            focusPickerSelected[slot] = project.uuid;
            renderOptions(search.value);
            startBtn.disabled = !focusPickerSelected[0] && !focusPickerSelected[1];
          };
          list.appendChild(opt);
        }
      };

      search.addEventListener('input', () => renderOptions(search.value));
      renderOptions('');
      slotEl.appendChild(list);
      slots.appendChild(slotEl);
    }

    picker.appendChild(slots);
    picker.appendChild(startBtn);
  }

  function renderFocusSwimlanes() {
    if (!currentIndex || !focusState) return;

    const container = document.getElementById('focus-swimlanes');
    container.innerHTML = '';

    for (const uuid of focusState.projects) {
      let project = null;
      for (const col of ['someday', 'anytime', 'today']) {
        const entry = currentIndex.byCol[col].projects.get(uuid);
        if (entry) { project = entry.project; break; }
      }
      if (!project) continue;
      const lane = makeFocusSwimlane(project);
      container.appendChild(lane);
      lane.querySelectorAll('.focus-col-cards').forEach(setupFocusColCards);
    }

    updateFocusBanner();
  }

  function makeFocusSwimlane(project) {
    const lane = document.createElement('div');
    lane.className = 'focus-swimlane';
    lane.dataset.projectId = project.uuid;

    let totalCount = 0;
    for (const col of ['anytime', 'today']) {
      const entry = currentIndex.byCol[col].projects.get(project.uuid);
      if (entry) {
        totalCount += entry.noHeading.length;
        for (const h of entry.headings.values()) totalCount += h.todos.length;
      }
    }

    const hdr = document.createElement('div');
    hdr.className = 'focus-swimlane-header';
    const nameEl = document.createElement('span');
    nameEl.className = 'focus-swimlane-name';
    nameEl.textContent = project.title;
    const countEl = document.createElement('span');
    countEl.className = 'focus-swimlane-count';
    countEl.textContent = String(totalCount);
    hdr.appendChild(nameEl);
    hdr.appendChild(countEl);
    lane.appendChild(hdr);

    const cols = document.createElement('div');
    cols.className = 'focus-cols';

    for (const { col, label } of [
      { col: 'anytime', label: 'Next'  },
      { col: 'today',   label: 'Today' }
    ]) {
      const focusCol = document.createElement('div');
      focusCol.className = 'focus-col';

      const titleEl = document.createElement('div');
      titleEl.className = 'focus-col-title';
      titleEl.textContent = label;
      focusCol.appendChild(titleEl);

      const cardsEl = document.createElement('div');
      cardsEl.className = 'focus-col-cards';
      cardsEl.dataset.col = col;
      cardsEl.dataset.projectId = project.uuid;

      const entry = currentIndex.byCol[col].projects.get(project.uuid);
      const tasks = [];
      if (entry) {
        tasks.push(...entry.noHeading);
        for (const h of entry.headings.values()) tasks.push(...h.todos);
      }

      if (tasks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'focus-col-empty';
        empty.textContent = 'No tasks';
        cardsEl.appendChild(empty);
      } else {
        for (const task of tasks) {
          const card = makeCard(task, col);
          if (card.dataset) card.dataset.projectId = project.uuid;
          cardsEl.appendChild(card);
        }
      }

      focusCol.appendChild(cardsEl);
      cols.appendChild(focusCol);
    }

    lane.appendChild(cols);
    return lane;
  }

  function setupFocusColCards(cardsEl) {
    const projectId = cardsEl.dataset.projectId;

    cardsEl.addEventListener('dragover', e => {
      if (!dragEl || dragEl.dataset.projectId !== projectId) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      cardsEl.classList.add('drag-over');
    });

    cardsEl.addEventListener('dragleave', e => {
      if (!cardsEl.contains(e.relatedTarget)) cardsEl.classList.remove('drag-over');
    });

    cardsEl.addEventListener('drop', e => {
      e.preventDefault();
      cardsEl.classList.remove('drag-over');

      if (!dragEl || dragEl.dataset.projectId !== projectId) return;

      const taskId = e.dataTransfer.getData('taskId');
      const sourceCol = e.dataTransfer.getData('sourceCol');
      const targetCol = cardsEl.dataset.col;

      if (!taskId || sourceCol === targetCol) { dragActive = false; return; }

      const empty = cardsEl.querySelector('.focus-col-empty');
      if (empty) empty.remove();

      const card = document.querySelector(`.card[data-id="${taskId}"]`);
      if (card) {
        card.dataset.col = targetCol;
        cardsEl.appendChild(card);
      }

      lastDropTime = Date.now();
      dragActive = false;

      fetch(`/todos/${encodeURIComponent(taskId)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ when: targetCol })
      }).then(r => {
        if (!r.ok) r.text().then(t => console.error('Update failed:', r.status, t));
      }).catch(err => console.error('Update failed:', err));
    });
  }

  // ── Verdict panel ─────────────────────────────────────────────────────────

  function showVerdictPanel() {
    document.getElementById('verdict-panel').classList.add('active');
  }

  function hideVerdictPanel() {
    const panel = document.getElementById('verdict-panel');
    panel.classList.remove('active');
    panel.querySelectorAll('.verdict-zone').forEach(z => z.classList.remove('hot', 'dim'));
  }

  function commitVerdict(action, taskId) {
    const card = document.querySelector(`.card[data-id="${taskId}"]`);
    if (card) {
      card.style.transition = 'opacity 200ms ease, transform 200ms ease';
      card.style.opacity = '0';
      card.style.transform = 'translateX(30px)';
      setTimeout(() => { card.remove(); updateCount('today'); }, 220);
    }
    lastDropTime = Date.now();
    dragActive = false;

    const opts = { method: 'DELETE', headers: { 'Content-Type': 'application/json' } };
    if (action === 'cancel') opts.body = JSON.stringify({ action: 'cancel' });
    fetch(`/todos/${encodeURIComponent(taskId)}`, opts).then(r => {
      if (!r.ok) r.text().then(t => console.error('Verdict failed:', r.status, t));
      else setTimeout(reload, 800);
    }).catch(err => console.error('Verdict failed:', err));
  }

  function setupVerdictPanel() {
    const panel = document.getElementById('verdict-panel');
    const zones = panel.querySelectorAll('.verdict-zone');

    zones.forEach(zone => {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        zones.forEach(z => {
          z.classList.remove('hot', 'dim');
          if (z !== zone) z.classList.add('dim'); else z.classList.add('hot');
        });
      });

      zone.addEventListener('dragleave', e => {
        if (!zone.contains(e.relatedTarget))
          zones.forEach(z => z.classList.remove('hot', 'dim'));
      });

      zone.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        const taskId = e.dataTransfer.getData('taskId');
        if (taskId) commitVerdict(zone.dataset.action, taskId);
        hideVerdictPanel();
      });
    });

    panel.addEventListener('dragover', e => e.preventDefault());
  }

  // ── Review Wizard ─────────────────────────────────────────────────────────

  function updateReviewBadge() {
    const badge = document.getElementById('review-badge');
    if (!badge) return;
    const lastReview = Number(localStorage.getItem('lastReviewTimestamp') || 0);
    const overdue = lastReview === 0 || Date.now() - lastReview > 7 * 24 * 60 * 60 * 1000;
    badge.style.display = 'inline-block';
    badge.className = overdue ? 'review-badge' : 'review-badge done';
  }

  // ── Review — Inbox Triage Board ───────────────────────────────────────────

  function initReviewBoard() {
    const inboxTasks = ((lastColData || {}).inbox || []).filter(t => t.type === 'to-do');
    reviewKanbanState = { inbox: inboxTasks, today: [], next: [], someday: [] };
    renderReviewBoard();
  }

  function renderReviewBoard() {
    ['inbox', 'today', 'next', 'someday'].forEach(col => {
      const el = document.getElementById('rcards-' + col);
      el.innerHTML = '';
      (reviewKanbanState[col] || []).forEach(task => el.appendChild(makeReviewCard(task, col)));
      setupReviewColDrop(el, col);
    });
  }

  function makeReviewCard(task, col) {
    const card = document.createElement('div');
    card.className = 'rcard';
    card.draggable = true;
    card.dataset.uuid = task.uuid;

    const title = document.createElement('div');
    title.className = 'rcard-title';
    title.textContent = task.title;
    card.appendChild(title);

    if (task.project_title) {
      const meta = document.createElement('div');
      meta.className = 'rcard-meta';
      meta.textContent = task.project_title;
      if (task.heading_title) {
        const h = document.createElement('span');
        h.className = 'rcard-meta-heading';
        h.textContent = ' · ' + task.heading_title;
        meta.appendChild(h);
      }
      card.appendChild(meta);
    }

    if (col !== 'inbox' && !task.project && !task.heading) {
      const chip = document.createElement('div');
      chip.className = 'proj-chip';
      chip.textContent = '+ project';
      chip.addEventListener('click', e => {
        e.stopPropagation();
        openProjectPicker(task, col, chip);
      });
      card.appendChild(chip);
    }

    card.addEventListener('dragstart', e => {
      rDragTask = task;
      rDragSourceCol = col;
      setTimeout(() => card.classList.add('rdragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('rdragging'));

    return card;
  }

  function setupReviewColDrop(cardsEl, targetCol) {
    cardsEl.addEventListener('dragover', e => {
      if (!rDragTask || rDragSourceCol === targetCol) return;
      e.preventDefault();
      cardsEl.classList.add('rdrag-over');
    });
    cardsEl.addEventListener('dragleave', e => {
      if (!cardsEl.contains(e.relatedTarget)) cardsEl.classList.remove('rdrag-over');
    });
    cardsEl.addEventListener('drop', e => {
      e.preventDefault();
      cardsEl.classList.remove('rdrag-over');
      if (!rDragTask || rDragSourceCol === targetCol) return;

      const task = rDragTask;
      const srcCol = rDragSourceCol;
      rDragTask = null; rDragSourceCol = null;

      reviewKanbanState[srcCol] = reviewKanbanState[srcCol].filter(t => t.uuid !== task.uuid);
      reviewKanbanState[targetCol].push(task);
      renderReviewBoard();

      if (targetCol !== 'inbox') {
        const whenMap = { today: 'today', next: 'anytime', someday: 'someday' };
        fetch(`/todos/${encodeURIComponent(task.uuid)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ when: whenMap[targetCol] })
        }).catch(err => console.error('Review assign failed:', err));
      }
    });
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  document.querySelectorAll('.column').forEach(setupColumn);
  setupVerdictPanel();
  checkFocusBannerOnLoad();
  load(true).then(() => {
    const savedView = localStorage.getItem('activeView');
    if (savedView && savedView !== 'board') setView(savedView);
  });
  setInterval(tick, POLL_MS);

</script>
</body>
</html>
