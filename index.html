<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things 3 Kanban</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #f2f2f7;
      letter-spacing: -0.2px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30d158;
      flex-shrink: 0;
    }

    .dot.error { background: #ff453a; }

    #banner {
      display: none;
      background: #3a1a18;
      border-top: 1px solid #ff453a40;
      border-bottom: 1px solid #ff453a40;
      padding: 10px 24px;
      font-size: 13px;
      color: #ff6961;
      flex-shrink: 0;
      align-items: center;
      gap: 12px;
    }

    #banner.visible { display: flex; }

    #banner button {
      background: #ff453a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    #banner button:hover { background: #ff6961; }

    .board {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2c2c2e;
      overflow: hidden;
      transition: background 0.1s;
    }

    .column:last-child { border-right: none; }

    .column.drag-over { background: #2c2c2e; }

    .column-header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #2c2c2e;
    }

    .column-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #8e8e93;
    }

    .column-count {
      font-size: 11px;
      color: #48484a;
      margin-left: auto;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .column-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-someday .column-indicator { background: #636366; }
    .col-next    .column-indicator { background: #0a84ff; }
    .col-today   .column-indicator { background: #ff9f0a; }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-track { background: transparent; }
    .cards::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    .card {
      background: #2c2c2e;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: grab;
      border: 1px solid #3a3a3c;
      transition: border-color 0.15s, opacity 0.15s, transform 0.1s;
      user-select: none;
    }

    .card:active { cursor: grabbing; }
    .card:hover { border-color: #48484a; }

    .card.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: #f2f2f7;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .card:not(:has(.chip)) .card-title { margin-bottom: 0; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #3a3a3c;
      color: #8e8e93;
      letter-spacing: 0.2px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #48484a;
      font-size: 12px;
      font-style: italic;
    }

    .loading-card {
      background: #2c2c2e;
      border-radius: 10px;
      height: 52px;
      border: 1px solid #3a3a3c;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>

<header>
  <div class="dot" id="status-dot"></div>
  <h1>Things 3</h1>
</header>

<div id="banner">
  <span>Cannot reach things-api — is it running on localhost:5225?</span>
  <button onclick="reload()">Retry</button>
</div>

<div class="board">
  <div class="column col-someday" id="col-someday" data-col="someday">
    <div class="column-header">
      <div class="column-indicator"></div>
      <span class="column-title">Someday</span>
      <span class="column-count" id="count-someday">—</span>
    </div>
    <div class="cards" id="cards-someday"></div>
  </div>

  <div class="column col-next" id="col-next" data-col="anytime">
    <div class="column-header">
      <div class="column-indicator"></div>
      <span class="column-title">Next</span>
      <span class="column-count" id="count-anytime">—</span>
    </div>
    <div class="cards" id="cards-anytime"></div>
  </div>

  <div class="column col-today" id="col-today" data-col="today">
    <div class="column-header">
      <div class="column-indicator"></div>
      <span class="column-title">Today</span>
      <span class="column-count" id="count-today">—</span>
    </div>
    <div class="cards" id="cards-today"></div>
  </div>
</div>

<script>
  const API = '';  // same origin — server.py proxies to things-api
  const POLL_MS = 30_000;
  const DROP_BUFFER_MS = 2000;

  const COLS = ['someday', 'anytime', 'today'];

  let dragActive = false;
  let lastDropTime = 0;
  let dragEl = null;
  let dragSourceCol = null;

  // ── Fetch ────────────────────────────────────────────────────────────────

  async function fetchCol(col) {
    const r = await fetch(`${API}/${col}`);
    if (!r.ok) throw new Error(`${col}: ${r.status}`);
    return r.json();
  }

  async function fetchAll() {
    const [someday, anytime, today] = await Promise.all(
      COLS.map(c => fetchCol(c))
    );
    return { someday, anytime, today };
  }

  // ── Render ───────────────────────────────────────────────────────────────

  function makeCard(task, col) {
    const el = document.createElement('div');
    el.className = 'card';
    el.draggable = true;
    el.dataset.id = task.id;
    el.dataset.col = col;

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = task.title;
    el.appendChild(title);

    if (task.tags && task.tags.length > 0) {
      const chips = document.createElement('div');
      chips.className = 'chips';
      task.tags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = tag;
        chips.appendChild(chip);
      });
      el.appendChild(chips);
    }

    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
    return el;
  }

  function showLoading(col) {
    const container = document.getElementById(`cards-${col}`);
    container.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const el = document.createElement('div');
      el.className = 'loading-card';
      container.appendChild(el);
    }
  }

  // Diff-by-ID reconciliation: add new cards, remove stale ones.
  // Unchanged cards are left in place — no flicker.
  function reconcile(col, tasks) {
    const container = document.getElementById(`cards-${col}`);
    const freshById = new Map(tasks.map(t => [t.id, t]));
    const currentCards = [...container.querySelectorAll('.card')];
    const currentIds = new Set(currentCards.map(c => c.dataset.id));

    // Remove cards no longer in this column
    currentCards.forEach(c => {
      if (!freshById.has(c.dataset.id)) c.remove();
    });

    // Add cards that appeared
    freshById.forEach((task, id) => {
      if (!currentIds.has(id)) {
        container.appendChild(makeCard(task, col));
      }
    });

    // Empty state
    const remaining = container.querySelectorAll('.card');
    const empty = container.querySelector('.empty-state');
    if (remaining.length === 0 && !empty) {
      const msg = document.createElement('div');
      msg.className = 'empty-state';
      msg.textContent = 'No tasks';
      container.appendChild(msg);
    } else if (remaining.length > 0 && empty) {
      empty.remove();
    }

    // Update count badge
    const count = document.getElementById(`count-${col}`);
    if (count) count.textContent = tasks.length;
  }

  // ── Load / Poll ───────────────────────────────────────────────────────────

  async function load(initial = false) {
    if (initial) COLS.forEach(c => showLoading(c));
    try {
      const data = await fetchAll();
      setError(false);
      COLS.forEach(col => reconcile(col, data[col]));
    } catch (e) {
      setError(true);
    }
  }

  function reload() {
    setError(false);
    COLS.forEach(c => showLoading(c));
    load();
  }

  function tick() {
    if (dragActive) return;
    if (Date.now() - lastDropTime < DROP_BUFFER_MS) return;
    load();
  }

  function setError(isError) {
    const banner = document.getElementById('banner');
    const dot = document.getElementById('status-dot');
    banner.classList.toggle('visible', isError);
    dot.classList.toggle('error', isError);
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────────

  function onDragStart(e) {
    dragActive = true;
    dragEl = e.currentTarget;
    dragSourceCol = dragEl.dataset.col;
    e.dataTransfer.setData('taskId', dragEl.dataset.id);
    e.dataTransfer.setData('sourceCol', dragSourceCol);
    e.dataTransfer.effectAllowed = 'move';
    // Small delay so the dragging style applies after the browser snapshot
    setTimeout(() => dragEl && dragEl.classList.add('dragging'), 0);
  }

  function onDragEnd() {
    dragActive = false;
    if (dragEl) {
      dragEl.classList.remove('dragging');
      dragEl = null;
    }
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  }

  function setupColumn(colEl) {
    colEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colEl.classList.add('drag-over');
    });

    colEl.addEventListener('dragleave', e => {
      // Only remove highlight when leaving the column itself, not child elements
      if (!colEl.contains(e.relatedTarget)) {
        colEl.classList.remove('drag-over');
      }
    });

    colEl.addEventListener('drop', e => {
      e.preventDefault();
      colEl.classList.remove('drag-over');

      const taskId = e.dataTransfer.getData('taskId');
      const sourceCol = e.dataTransfer.getData('sourceCol');
      const targetCol = colEl.dataset.col;

      if (!taskId || sourceCol === targetCol) {
        dragActive = false;
        return;
      }

      // Optimistic DOM move
      const card = document.querySelector(`.card[data-id="${taskId}"]`);
      if (card) {
        const targetCards = colEl.querySelector('.cards');
        card.dataset.col = targetCol;
        targetCards.appendChild(card);

        // Fix empty states
        updateEmptyState(document.getElementById(`cards-${sourceCol}`));
        updateEmptyState(targetCards);

        // Update counts
        updateCount(sourceCol);
        updateCount(targetCol);
      }

      lastDropTime = Date.now();
      dragActive = false;

      // Write to Things 3
      window.location.href = `things:///update?id=${encodeURIComponent(taskId)}&when=${targetCol}`;
    });
  }

  function updateEmptyState(container) {
    const cards = container.querySelectorAll('.card');
    const empty = container.querySelector('.empty-state');
    if (cards.length === 0 && !empty) {
      const msg = document.createElement('div');
      msg.className = 'empty-state';
      msg.textContent = 'No tasks';
      container.appendChild(msg);
    } else if (cards.length > 0 && empty) {
      empty.remove();
    }
  }

  function updateCount(col) {
    const container = document.getElementById(`cards-${col}`);
    const count = document.getElementById(`count-${col}`);
    if (container && count) {
      count.textContent = container.querySelectorAll('.card').length;
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  document.querySelectorAll('.column').forEach(setupColumn);
  load(true);
  setInterval(tick, POLL_MS);
</script>
</body>
</html>
