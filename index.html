<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things 3 Kanban</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #f2f2f7;
      letter-spacing: -0.2px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30d158;
      flex-shrink: 0;
    }

    .dot.error { background: #ff453a; }

    #banner {
      display: none;
      background: #3a1a18;
      border-top: 1px solid #ff453a40;
      border-bottom: 1px solid #ff453a40;
      padding: 10px 24px;
      font-size: 13px;
      color: #ff6961;
      flex-shrink: 0;
      align-items: center;
      gap: 12px;
    }

    #banner.visible { display: flex; }

    #banner button {
      background: #ff453a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    #banner button:hover { background: #ff6961; }

    /* ── Content: sidebar + board ─────────────────────────────────────────── */

    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #2c2c2e;
      overflow-y: auto;
      padding: 8px 0 16px;
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    .sidebar-all {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #8e8e93;
      padding: 6px 12px;
      margin: 2px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .sidebar-all:hover { color: #f2f2f7; background: #2c2c2e; }
    .sidebar-all.active { color: #f2f2f7; background: #2c2c2e; }

    .sidebar-area {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #48484a;
      padding: 14px 16px 4px;
    }

    .sidebar-item {
      font-size: 12px;
      font-weight: 500;
      color: #8e8e93;
      padding: 5px 12px;
      margin: 1px 8px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item:hover { color: #f2f2f7; background: #2c2c2e; }
    .sidebar-item.active { color: #f2f2f7; background: #2c2c2e; }

    /* ── Sidebar: project assignment panel ──────────────────────────────── */

    .sidebar-proj-wrap { margin: 1px 8px; border-radius: 8px; overflow: hidden; }
    .sidebar-proj-wrap .sidebar-item { margin: 0; border-radius: 0; }
    .sidebar-proj-wrap.assign-open { background: #242426; }

    .assign-panel { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }
    .sidebar-proj-wrap.assign-open .assign-panel { max-height: 500px; }

    .assign-panel-inner { padding: 6px 8px 8px; }

    .assign-sub-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: #48484a; padding: 2px 2px 4px;
    }

    .assign-when-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom: 8px; }

    .assign-when-btn {
      padding: 6px 0; border-radius: 6px; font-size: 9px; font-weight: 700;
      letter-spacing: 0.3px; text-align: center; text-transform: uppercase;
      border: 1.5px solid #2c2c2e; background: #1c1c1e; color: #3a3a3c;
      transition: all 0.12s;
    }
    .assign-when-btn[data-when="someday"].sel { background: #061a3a; border-color: #0a84ff; color: #0a84ff; }
    .assign-when-btn[data-when="anytime"].sel  { background: #071f0e; border-color: #32d74b; color: #32d74b; }
    .assign-when-btn[data-when="today"].sel    { background: #271400; border-color: #ff9f0a; color: #ff9f0a; }

    .assign-heading-zone {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 7px; border-radius: 5px; margin-bottom: 3px;
      border: 1.5px dashed #3a3a3c; color: #636366; font-size: 11px;
      transition: all 0.1s;
    }
    .assign-heading-zone:last-child { margin-bottom: 0; }
    .assign-heading-zone .az-arrow { font-size: 10px; color: #3a3a3c; transition: color 0.1s; }

    .assign-heading-zone.az-s { border-color: #0a84ff; background: rgba(10,84,255,0.07); color: #0a84ff; }
    .assign-heading-zone.az-s .az-arrow { color: #0a84ff; }
    .assign-heading-zone.az-n { border-color: #32d74b; background: rgba(50,215,75,0.07); color: #32d74b; }
    .assign-heading-zone.az-n .az-arrow { color: #32d74b; }
    .assign-heading-zone.az-t { border-color: #ff9f0a; background: rgba(255,159,10,0.07); color: #ff9f0a; }
    .assign-heading-zone.az-t .az-arrow { color: #ff9f0a; }

    /* ── Assignment toast ────────────────────────────────────────────────── */

    #assign-toast {
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: #2c2c2e;
      border: 1px solid #48484a;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 12px;
      color: #ebebf5;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      white-space: nowrap;
      z-index: 200;
    }

    #assign-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #assign-toast .t-green  { color: #32d74b; font-weight: 600; }
    #assign-toast .t-blue   { color: #0a84ff; font-weight: 600; }
    #assign-toast .t-orange { color: #ff9f0a; font-weight: 600; }

    /* ── Board ───────────────────────────────────────────────────────────── */

    .board {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2c2c2e;
      overflow: hidden;
      transition: background 0.1s;
    }

    .column:last-child { border-right: none; }

    .column.drag-over { background: #2c2c2e; }

    .column-header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #2c2c2e;
    }

    .column-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #8e8e93;
    }

    .column-count {
      font-size: 11px;
      color: #48484a;
      margin-left: auto;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .column-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-inbox   .column-indicator { background: #8e8e93; }
    .col-someday .column-indicator { background: #636366; }
    .col-next    .column-indicator { background: #0a84ff; }
    .col-today   .column-indicator { background: #ff9f0a; }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-track { background: transparent; }
    .cards::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    /* ── Group headers ───────────────────────────────────────────────────── */

    .group-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #48484a;
      padding: 4px 2px;
      border-bottom: 1px solid #2c2c2e;
      margin-top: 8px;
      pointer-events: none;
      user-select: none;
      flex-shrink: 0;
    }

    .group-header:first-child { margin-top: 0; }

    /* ── Cards ───────────────────────────────────────────────────────────── */

    .card {
      background: #2c2c2e;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: grab;
      border: 1px solid #3a3a3c;
      transition: border-color 0.15s, opacity 0.15s, transform 0.1s;
      user-select: none;
    }

    .card:active { cursor: grabbing; }
    .card:hover { border-color: #48484a; }

    .card.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: #f2f2f7;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .card:not(:has(.chip)) .card-title { margin-bottom: 0; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #3a3a3c;
      color: #8e8e93;
      letter-spacing: 0.2px;
    }

    .card-uuid {
      font-size: 9px;
      color: #3a3a3c;
      margin-top: 6px;
      user-select: all;
      cursor: text;
    }

    .chip-date               { background: #2c2c2e; color: #636366; }
    .chip-deadline           { background: #2c2c2e; color: #636366; }
    .chip-deadline.due-soon  { background: #2e2200; color: #ff9f0a; }
    .chip-deadline.due-today { background: #2e1400; color: #ff6b00; }
    .chip-deadline.overdue   { background: #2e0000; color: #ff453a; }

    .card-separator {
      height: 1px;
      background: #3a3a3c;
      margin: 4px 0;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #48484a;
      font-size: 12px;
      font-style: italic;
    }

    .loading-card {
      background: #2c2c2e;
      border-radius: 10px;
      height: 52px;
      border: 1px solid #3a3a3c;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>

<header>
  <div class="dot" id="status-dot"></div>
  <h1>Things 3</h1>
</header>

<div id="assign-toast"></div>

<div id="banner">
  <span>Cannot reach things-api — is it running on localhost:5225?</span>
  <button onclick="reload()">Retry</button>
</div>

<div class="content">
  <nav class="sidebar" id="sidebar"></nav>

  <div class="board">
    <div class="column col-inbox" id="col-inbox" data-col="inbox">
      <div class="column-header">
        <div class="column-indicator"></div>
        <span class="column-title">Inbox</span>
        <span class="column-count" id="count-inbox">—</span>
      </div>
      <div class="cards" id="cards-inbox"></div>
    </div>

    <div class="column col-someday" id="col-someday" data-col="someday">
      <div class="column-header">
        <div class="column-indicator"></div>
        <span class="column-title">Someday</span>
        <span class="column-count" id="count-someday">—</span>
      </div>
      <div class="cards" id="cards-someday"></div>
    </div>

    <div class="column col-next" id="col-next" data-col="anytime">
      <div class="column-header">
        <div class="column-indicator"></div>
        <span class="column-title">Next</span>
        <span class="column-count" id="count-anytime">—</span>
      </div>
      <div class="cards" id="cards-anytime"></div>
    </div>

    <div class="column col-today" id="col-today" data-col="today">
      <div class="column-header">
        <div class="column-indicator"></div>
        <span class="column-title">Today</span>
        <span class="column-count" id="count-today">—</span>
      </div>
      <div class="cards" id="cards-today"></div>
    </div>
  </div>
</div>

<script>
  const API = '';  // same origin — server.py proxies to things-api
  const POLL_MS = 30_000;
  const DROP_BUFFER_MS = 2000;

  const COLS = ['inbox', 'someday', 'anytime', 'today'];

  let logbookUuids = new Set();

  let dragActive = false;
  let lastDropTime = 0;
  let dragEl = null;
  let dragSourceCol = null;

  let selectedProject = null;  // null = All, 'inbox', 'other', or project UUID
  let currentIndex = null;

  let assignOpenId = null;
  let assignActiveWhen = 'anytime';
  let assignCloseTimer = null;

  // ── Fetch ────────────────────────────────────────────────────────────────


  async function fetchLogbook() {
    try {
      const r = await fetch(`${API}/logbook`);
      if (!r.ok) return;
      const data = await r.json();
      logbookUuids = new Set(data.map(t => t.uuid));
    } catch (e) { /* non-fatal */ }
  }

  async function fetchCol(col) {
    const r = await fetch(`${API}/${col}`);
    if (!r.ok) throw new Error(`${col}: ${r.status}`);
    return r.json();
  }

  async function fetchAll() {
    const [inbox, someday, anytime, today] = await Promise.all(
      COLS.map(c => fetchCol(c))
    );
    return { inbox, someday, anytime, today };
  }

  // ── Index ─────────────────────────────────────────────────────────────────

  function buildIndex(inbox, someday, anytime, today) {
    const colData = { inbox, someday, anytime, today };

    // Today takes priority — build its UUID set so other columns can skip duplicates
    const todayUuids = new Set(
      (colData.today || []).filter(t => t.type === 'to-do').map(t => t.uuid)
    );

    // Build lookup maps scanning all items across all columns
    const projectMap = new Map();  // projectUuid → { uuid, title, area, area_title }
    const headingMap = new Map();  // headingUuid → { uuid, title, project }
    const areaOrder = [];
    const areaSet = new Set();

    for (const tasks of Object.values(colData)) {
      for (const t of tasks) {
        if (t.type === 'project') {
          if (!projectMap.has(t.uuid)) {
            projectMap.set(t.uuid, { uuid: t.uuid, title: t.title, area: t.area, area_title: t.area_title });
          }
          if (t.area && !areaSet.has(t.area)) {
            areaSet.add(t.area);
            areaOrder.push({ uuid: t.area, title: t.area_title });
          }
        } else if (t.type === 'heading') {
          if (!headingMap.has(t.uuid)) {
            headingMap.set(t.uuid, { uuid: t.uuid, title: t.title, project: t.project });
          }
        }
      }
    }

    // Bucket todos per column
    const byCol = {};
    for (const col of COLS) {
      byCol[col] = {
        inbox: [],
        projects: new Map(),  // projectUuid → { project, noHeading: [], headings: Map }
        other: new Map()      // areaUuid → { area, todos: [] }
      };
    }

    for (const col of COLS) {
      const bucket = byCol[col];
      for (const t of colData[col]) {
        if (t.type !== 'to-do') continue;
        if (logbookUuids.has(t.uuid)) continue;
        if (col !== 'today' && todayUuids.has(t.uuid)) continue;
        // things-api bug: logged recurring instances appear in /today with wrong
        // start type and no modification history — filter them out
        if (col === 'today' && t.start === 'Someday' && t.modified === null) continue;

        if (!t.heading && !t.project && !t.area) {
          bucket.inbox.push(t);
          continue;
        }

        if (!t.heading && !t.project && t.area) {
          // Area-direct, no project
          if (!bucket.other.has(t.area)) {
            bucket.other.set(t.area, { area: { uuid: t.area, title: t.area_title }, todos: [] });
          }
          bucket.other.get(t.area).todos.push(t);
          continue;
        }

        // Has project directly or via heading
        let projectUuid = t.project || null;
        const headingUuid = t.heading || null;

        if (headingUuid && !projectUuid) {
          const h = headingMap.get(headingUuid);
          projectUuid = h ? h.project : null;
        }

        if (!projectUuid) {
          if (headingUuid) {
            // Heading not resolvable via API (no start date) — group by heading_title
            const syntheticKey = '_unresolved_' + headingUuid;
            if (!bucket.projects.has(syntheticKey)) {
              bucket.projects.set(syntheticKey, {
                project: { uuid: syntheticKey, title: t.heading_title || t.project_title || '?' },
                noHeading: [],
                headings: new Map()
              });
            }
            bucket.projects.get(syntheticKey).noHeading.push(t);
            continue;
          }
          bucket.inbox.push(t);
          continue;
        }

        const knownProject = projectMap.get(projectUuid);

        if (!bucket.projects.has(projectUuid)) {
          const project = knownProject || { uuid: projectUuid, title: t.project_title || '?', area: t.area, area_title: t.area_title };
          bucket.projects.set(projectUuid, { project, noHeading: [], headings: new Map() });
        }

        const proj = bucket.projects.get(projectUuid);

        if (headingUuid) {
          if (!proj.headings.has(headingUuid)) {
            const heading = headingMap.get(headingUuid) || { uuid: headingUuid, title: t.heading_title || '?' };
            proj.headings.set(headingUuid, { heading, todos: [] });
          }
          proj.headings.get(headingUuid).todos.push(t);
        } else {
          proj.noHeading.push(t);
        }
      }
    }

    // Build sidebar (only sections/projects with todos in any column)
    const projectsWithTodos = new Set();
    for (const col of COLS) {
      for (const uuid of byCol[col].projects.keys()) projectsWithTodos.add(uuid);
    }

    const sidebar = [];

    const hasInbox = COLS.some(col => byCol[col].inbox.length > 0);
    if (hasInbox) sidebar.push({ type: 'inbox' });

    for (const area of areaOrder) {
      const projects = [...projectMap.values()].filter(p => p.area === area.uuid && projectsWithTodos.has(p.uuid));
      if (projects.length > 0) {
        sidebar.push({ type: 'area', uuid: area.uuid, title: area.title, projects });
      }
    }

    const hasOther = COLS.some(col => byCol[col].other.size > 0);
    if (hasOther) sidebar.push({ type: 'other' });

    // Per-project heading list for the assignment panel
    const projectHeadings = new Map();
    for (const [, h] of headingMap) {
      if (h.project) {
        if (!projectHeadings.has(h.project)) projectHeadings.set(h.project, []);
        projectHeadings.get(h.project).push({ uuid: h.uuid, title: h.title });
      }
    }

    return { sidebar, byCol, projectHeadings };
  }

  // ── Render: sidebar ───────────────────────────────────────────────────────

  function renderSidebar(index) {
    const nav = document.getElementById('sidebar');
    nav.innerHTML = '';

    const allBtn = document.createElement('div');
    allBtn.className = 'sidebar-all' + (selectedProject === null ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', () => { selectedProject = null; renderAll(); });
    nav.appendChild(allBtn);

    for (const item of index.sidebar) {
      if (item.type === 'inbox') {
        nav.appendChild(makeSidebarItem('Inbox', 'inbox'));

      } else if (item.type === 'area') {
        const label = document.createElement('div');
        label.className = 'sidebar-area';
        label.textContent = item.title;
        nav.appendChild(label);

        for (const project of item.projects) {
          nav.appendChild(makeSidebarProjectItem(project, index.projectHeadings));
        }

      } else if (item.type === 'other') {
        nav.appendChild(makeSidebarItem('Other', 'other'));
      }
    }

    setupSidebarAssign(nav);
  }

  function makeSidebarItem(label, id) {
    const row = document.createElement('div');
    row.className = 'sidebar-item' + (selectedProject === id ? ' active' : '');
    row.textContent = label;
    row.addEventListener('click', () => { selectedProject = id; renderAll(); });
    return row;
  }

  function makeSidebarProjectItem(project, projectHeadings) {
    const wrap = document.createElement('div');
    wrap.className = 'sidebar-proj-wrap';
    wrap.dataset.projectId = project.uuid;

    const row = document.createElement('div');
    row.className = 'sidebar-item' + (selectedProject === project.uuid ? ' active' : '');
    row.textContent = project.title;
    row.addEventListener('click', () => { selectedProject = project.uuid; renderAll(); });
    wrap.appendChild(row);

    // Assignment panel
    const panel = document.createElement('div');
    panel.className = 'assign-panel';
    const inner = document.createElement('div');
    inner.className = 'assign-panel-inner';

    // When selector
    const whenLabel = document.createElement('div');
    whenLabel.className = 'assign-sub-label';
    whenLabel.textContent = 'Move to';
    inner.appendChild(whenLabel);

    const whenRow = document.createElement('div');
    whenRow.className = 'assign-when-row';
    for (const w of ['someday', 'anytime', 'today']) {
      const btn = document.createElement('div');
      btn.className = 'assign-when-btn' + (w === 'anytime' ? ' sel' : '');
      btn.dataset.when = w;
      btn.textContent = w === 'someday' ? 'Someday' : w === 'anytime' ? 'Next' : 'Today';
      btn.addEventListener('dragenter', e => {
        e.preventDefault();
        e.stopPropagation();
        clearTimeout(assignCloseTimer);
        assignActiveWhen = w;
        whenRow.querySelectorAll('.assign-when-btn').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
      });
      btn.addEventListener('dragover', e => e.preventDefault());
      btn.addEventListener('drop', e => e.preventDefault());
      whenRow.appendChild(btn);
    }
    inner.appendChild(whenRow);

    // Heading zones
    const hdLabel = document.createElement('div');
    hdLabel.className = 'assign-sub-label';
    hdLabel.textContent = 'Under heading';
    inner.appendChild(hdLabel);

    const headings = projectHeadings.get(project.uuid) || [];
    const zones = [{ uuid: null, title: '(no heading)' }, ...headings];
    const whenOverClass = { someday: 'az-s', anytime: 'az-n', today: 'az-t' };

    for (const h of zones) {
      const zone = document.createElement('div');
      zone.className = 'assign-heading-zone';
      zone.innerHTML = `<span class="az-arrow">→</span><span>${h.title}</span>`;
      zone.dataset.headingUuid = h.uuid || '';
      zone.dataset.headingTitle = h.title;
      zone.dataset.projectUuid = project.uuid;

      zone.addEventListener('dragenter', e => {
        e.preventDefault();
        e.stopPropagation();
        clearTimeout(assignCloseTimer);
        zone.classList.add(whenOverClass[assignActiveWhen]);
      });
      zone.addEventListener('dragleave', e => {
        if (!zone.contains(e.relatedTarget))
          zone.classList.remove('az-s', 'az-n', 'az-t');
      });
      zone.addEventListener('dragover', e => e.preventDefault());
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('az-s', 'az-n', 'az-t');
        const taskId = e.dataTransfer.getData('taskId');
        if (!taskId) return;

        // Optimistic: remove card from its column
        const card = document.querySelector(`.card[data-id="${taskId}"]`);
        const cardTitle = card ? card.querySelector('.card-title')?.textContent : taskId;
        if (card) card.remove();
        lastDropTime = Date.now();
        dragActive = false;
        closeAssignPanel();
        showAssignToast(cardTitle, project.title, h.title, assignActiveWhen);

        const body = { list_id: project.uuid, when: assignActiveWhen };
        if (h.uuid) body.heading_id = h.uuid;

        fetch(`/todos/${encodeURIComponent(taskId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(r => {
          if (!r.ok) r.text().then(t => console.error('Assign failed:', r.status, t));
          else setTimeout(reload, 800);
        }).catch(err => console.error('Assign failed:', err));
      });

      inner.appendChild(zone);
    }

    panel.appendChild(inner);
    wrap.appendChild(panel);
    return wrap;
  }

  function openAssignPanel(projectId) {
    if (assignOpenId === projectId) { clearTimeout(assignCloseTimer); return; }
    closeAssignPanel();
    assignOpenId = projectId;
    assignActiveWhen = 'anytime';
    const wrap = document.querySelector(`.sidebar-proj-wrap[data-project-id="${projectId}"]`);
    if (!wrap) return;
    wrap.classList.add('assign-open');
    wrap.querySelectorAll('.assign-when-btn').forEach(b => {
      b.classList.toggle('sel', b.dataset.when === 'anytime');
    });
  }

  function closeAssignPanel() {
    if (!assignOpenId) return;
    const wrap = document.querySelector(`.sidebar-proj-wrap[data-project-id="${assignOpenId}"]`);
    if (wrap) wrap.classList.remove('assign-open');
    assignOpenId = null;
  }

  let assignToastTimer;
  function showAssignToast(cardTitle, projectTitle, headingTitle, when) {
    const el = document.getElementById('assign-toast');
    const whenCls = when === 'someday' ? 't-blue' : when === 'today' ? 't-orange' : 't-green';
    const whenLabel = when === 'someday' ? 'Someday' : when === 'today' ? 'Today' : 'Next';
    const dest = headingTitle === '(no heading)' ? projectTitle : `${projectTitle} / ${headingTitle}`;
    el.innerHTML = `<span class="${whenCls}">${cardTitle}</span> → ${dest} · <span class="${whenCls}">${whenLabel}</span>`;
    el.classList.add('show');
    clearTimeout(assignToastTimer);
    assignToastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  function setupSidebarAssign(nav) {
    nav.querySelectorAll('.sidebar-proj-wrap').forEach(wrap => {
      wrap.addEventListener('dragenter', e => {
        e.preventDefault();
        clearTimeout(assignCloseTimer);
        openAssignPanel(wrap.dataset.projectId);
      });
      wrap.addEventListener('dragover', e => e.preventDefault());
    });

    nav.addEventListener('dragleave', e => {
      if (!nav.contains(e.relatedTarget)) {
        assignCloseTimer = setTimeout(closeAssignPanel, 300);
      }
    });
  }

  // ── Render: columns ───────────────────────────────────────────────────────

  function renderCol(col, index) {
    const container = document.getElementById(`cards-${col}`);
    container.innerHTML = '';

    const bucket = index.byCol[col];
    let totalCards = 0;

    if (selectedProject === null) {
      // All: group by project, sidebar order
      if (bucket.inbox.length > 0) {
        bucket.inbox.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

      // Sidebar-listed projects (have an area, appear in hierarchy)
      const renderedProjects = new Set();
      for (const sItem of index.sidebar) {
        if (sItem.type !== 'area') continue;
        for (const project of sItem.projects) {
          const group = bucket.projects.get(project.uuid);
          if (!group) continue;
          const todos = [...group.noHeading, ...[...group.headings.values()].flatMap(h => h.todos)];
          if (todos.length === 0) continue;
          container.appendChild(makeGroupHeader(project.title));
          todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
          renderedProjects.add(project.uuid);
        }
      }

      // Projects not in sidebar (no area or not returned by API — e.g. sub-projects)
      for (const [uuid, group] of bucket.projects) {
        if (renderedProjects.has(uuid)) continue;
        const todos = [...group.noHeading, ...[...group.headings.values()].flatMap(h => h.todos)];
        if (todos.length === 0) continue;
        container.appendChild(makeGroupHeader(group.project.title));
        todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

      for (const [, group] of bucket.other) {
        if (group.todos.length === 0) continue;
        container.appendChild(makeGroupHeader(`Other — ${group.area.title}`));
        group.todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

    } else if (selectedProject === 'inbox') {
      bucket.inbox.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });

    } else if (selectedProject === 'other') {
      for (const [, group] of bucket.other) {
        if (group.todos.length === 0) continue;
        container.appendChild(makeGroupHeader(group.area.title));
        group.todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
      }

    } else {
      // Specific project: group by heading
      const group = bucket.projects.get(selectedProject);
      if (group) {
        group.noHeading.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
        for (const [, hGroup] of group.headings) {
          if (hGroup.todos.length === 0) continue;
          container.appendChild(makeGroupHeader(hGroup.heading.title));
          hGroup.todos.forEach(t => { container.appendChild(makeCard(t, col)); totalCards++; });
        }
      }
    }

    // Empty state
    if (totalCards === 0) {
      const msg = document.createElement('div');
      msg.className = 'empty-state';
      msg.textContent = selectedProject !== null ? 'No tasks in this filter' : 'No tasks';
      container.appendChild(msg);
    }

    // Count badge
    const count = document.getElementById(`count-${col}`);
    if (count) count.textContent = totalCards || '—';
  }

  function makeGroupHeader(title) {
    const el = document.createElement('div');
    el.className = 'group-header';
    el.draggable = false;
    el.textContent = title;
    return el;
  }

  function renderAll() {
    if (!currentIndex) return;
    renderSidebar(currentIndex);
    COLS.forEach(col => renderCol(col, currentIndex));
  }

  // ── Card ──────────────────────────────────────────────────────────────────

  function makeCard(task, col) {
    if (!task.title) {
      const sep = document.createElement('div');
      sep.className = 'card-separator';
      return sep;
    }

    const el = document.createElement('div');
    el.className = 'card';
    el.draggable = true;
    el.dataset.id = task.uuid;
    el.dataset.col = col;

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = task.title;
    el.appendChild(title);

    if ((task.tags && task.tags.length > 0) || task.start_date || task.deadline) {
      const chips = document.createElement('div');
      chips.className = 'chips';

      if (task.tags) {
        task.tags.forEach(tag => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = tag;
          chips.appendChild(chip);
        });
      }

      if (task.start_date) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const d = new Date(task.start_date + 'T00:00:00');
        const opts = { day: 'numeric', month: 'short' };
        if (d.getFullYear() !== today.getFullYear()) opts.year = 'numeric';
        const chip = document.createElement('span');
        chip.className = 'chip chip-date';
        chip.textContent = d.toLocaleDateString('en-GB', opts);
        chips.appendChild(chip);
      }

      if (task.deadline) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const due = new Date(task.deadline + 'T00:00:00');
        const diff = Math.round((due - today) / 86400000);
        const chip = document.createElement('span');
        chip.className = 'chip chip-deadline';
        if (diff < 0)      chip.classList.add('overdue');
        else if (diff === 0) chip.classList.add('due-today');
        else if (diff <= 7)  chip.classList.add('due-soon');
        const opts = { day: 'numeric', month: 'short' };
        if (due.getFullYear() !== today.getFullYear()) opts.year = 'numeric';
        chip.textContent = due.toLocaleDateString('en-GB', opts);
        chips.appendChild(chip);
      }

      el.appendChild(chips);
    }

    const uuid = document.createElement('div');
    uuid.className = 'card-uuid';
    uuid.textContent = task.uuid;
    el.appendChild(uuid);

    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
    return el;
  }

  // ── Loading ───────────────────────────────────────────────────────────────

  function showLoading(col) {
    const container = document.getElementById(`cards-${col}`);
    container.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const el = document.createElement('div');
      el.className = 'loading-card';
      container.appendChild(el);
    }
  }

  // ── Load / Poll ───────────────────────────────────────────────────────────

  async function load(initial = false) {
    if (initial) {
      COLS.forEach(c => showLoading(c));
      await fetchLogbook();
    }
    try {
      const data = await fetchAll();
      currentIndex = buildIndex(data.inbox, data.someday, data.anytime, data.today);
      setError(false);
      renderAll();
    } catch (e) {
      setError(true);
    }
  }

  function reload() {
    setError(false);
    COLS.forEach(c => showLoading(c));
    load();
  }

  function tick() {
    if (dragActive) return;
    if (Date.now() - lastDropTime < DROP_BUFFER_MS) return;
    load();
  }

  function setError(isError) {
    const banner = document.getElementById('banner');
    const dot = document.getElementById('status-dot');
    banner.classList.toggle('visible', isError);
    dot.classList.toggle('error', isError);
  }

  // ── Drag & Drop ───────────────────────────────────────────────────────────

  function onDragStart(e) {
    dragActive = true;
    dragEl = e.currentTarget;
    dragSourceCol = dragEl.dataset.col;
    e.dataTransfer.setData('taskId', dragEl.dataset.id);
    e.dataTransfer.setData('sourceCol', dragSourceCol);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => dragEl && dragEl.classList.add('dragging'), 0);
  }

  function onDragEnd() {
    dragActive = false;
    if (dragEl) {
      dragEl.classList.remove('dragging');
      dragEl = null;
    }
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    clearTimeout(assignCloseTimer);
    assignCloseTimer = setTimeout(closeAssignPanel, 150);
  }

  function setupColumn(colEl) {
    colEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colEl.classList.add('drag-over');
    });

    colEl.addEventListener('dragleave', e => {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over');
    });

    colEl.addEventListener('drop', e => {
      e.preventDefault();
      colEl.classList.remove('drag-over');

      const taskId = e.dataTransfer.getData('taskId');
      const sourceCol = e.dataTransfer.getData('sourceCol');
      const targetCol = colEl.dataset.col;

      if (!taskId || sourceCol === targetCol) { dragActive = false; return; }

      // Optimistic DOM move
      const card = document.querySelector(`.card[data-id="${taskId}"]`);
      if (card) {
        const targetCards = colEl.querySelector('.cards');
        card.dataset.col = targetCol;
        targetCards.appendChild(card);
        updateCount(sourceCol);
        updateCount(targetCol);
      }

      lastDropTime = Date.now();
      dragActive = false;

      if (targetCol !== 'inbox') {
        fetch(`/todos/${encodeURIComponent(taskId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ when: targetCol })
        }).then(r => {
          if (!r.ok) r.text().then(t => console.error('Update failed:', r.status, t));
        }).catch(e => console.error('Update failed:', e));
      }
    });
  }

  function updateCount(col) {
    const container = document.getElementById(`cards-${col}`);
    const count = document.getElementById(`count-${col}`);
    if (container && count) count.textContent = container.querySelectorAll('.card').length;
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  document.querySelectorAll('.column').forEach(setupColumn);
  load(true);
  setInterval(tick, POLL_MS);
</script>
</body>
</html>
