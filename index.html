<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things 3 Kanban</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #f2f2f7;
      letter-spacing: -0.2px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30d158;
      flex-shrink: 0;
    }

    .dot.error { background: #ff453a; }

    #banner {
      display: none;
      background: #3a1a18;
      border-top: 1px solid #ff453a40;
      border-bottom: 1px solid #ff453a40;
      padding: 10px 24px;
      font-size: 13px;
      color: #ff6961;
      flex-shrink: 0;
      align-items: center;
      gap: 12px;
    }

    #banner.visible { display: flex; }

    #banner button {
      background: #ff453a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    #banner button:hover { background: #ff6961; }

    /* ── Content: sidebar + board ─────────────────────────────────────────── */

    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #2c2c2e;
      overflow-y: auto;
      padding: 8px 0 16px;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    .sidebar-all {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #8e8e93;
      padding: 6px 12px;
      margin: 2px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .sidebar-all:hover { color: #f2f2f7; background: #2c2c2e; }
    .sidebar-all.active { color: #f2f2f7; background: #2c2c2e; }

    .sidebar-area {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #48484a;
      padding: 14px 16px 4px;
    }

    .sidebar-item {
      font-size: 12px;
      font-weight: 500;
      color: #8e8e93;
      padding: 5px 12px;
      margin: 1px 8px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item:hover { color: #f2f2f7; background: #2c2c2e; }
    .sidebar-item.active { color: #f2f2f7; background: #2c2c2e; }

    /* ── Sidebar: project assignment panel ──────────────────────────────── */

    .sidebar-proj-wrap { margin: 1px 8px; border-radius: 8px; overflow: hidden; }
    .sidebar-proj-wrap .sidebar-item { margin: 0; border-radius: 0; }
    .sidebar-proj-wrap.assign-open { background: #242426; border-radius: 8px 8px 0 0; }

    .assign-panel { display: none; }
    .assign-panel.assign-panel-visible { display: block; position: fixed; z-index: 200; background: #242426; border-radius: 0 0 8px 8px; overflow-y: auto; }

    .assign-panel-inner { padding: 6px 8px 8px; }

    .assign-sub-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: #48484a; padding: 2px 2px 4px;
    }

    .assign-when-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom: 8px; }

    .assign-when-btn {
      padding: 6px 0; border-radius: 6px; font-size: 9px; font-weight: 700;
      letter-spacing: 0.3px; text-align: center; text-transform: uppercase;
      border: 1.5px solid #2c2c2e; background: #1c1c1e; color: #3a3a3c;
      transition: all 0.12s;
    }
    .assign-when-btn[data-when="someday"].sel { background: #061a3a; border-color: #0a84ff; color: #0a84ff; }
    .assign-when-btn[data-when="anytime"].sel  { background: #071f0e; border-color: #32d74b; color: #32d74b; }
    .assign-when-btn[data-when="today"].sel    { background: #271400; border-color: #ff9f0a; color: #ff9f0a; }

    .assign-heading-zone {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 7px; border-radius: 5px; margin-bottom: 3px;
      border: 1.5px dashed #3a3a3c; color: #636366; font-size: 11px;
      transition: all 0.1s;
    }
    .assign-heading-zone:last-child { margin-bottom: 0; }
    .assign-heading-zone .az-arrow { font-size: 10px; color: #3a3a3c; transition: color 0.1s; }

    .assign-heading-zone.az-s { border-color: #0a84ff; background: rgba(10,84,255,0.07); color: #0a84ff; }
    .assign-heading-zone.az-s .az-arrow { color: #0a84ff; }
    .assign-heading-zone.az-n { border-color: #32d74b; background: rgba(50,215,75,0.07); color: #32d74b; }
    .assign-heading-zone.az-n .az-arrow { color: #32d74b; }
    .assign-heading-zone.az-t { border-color: #ff9f0a; background: rgba(255,159,10,0.07); color: #ff9f0a; }
    .assign-heading-zone.az-t .az-arrow { color: #ff9f0a; }

    /* ── Assignment toast ────────────────────────────────────────────────── */

    #assign-toast {
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: #2c2c2e;
      border: 1px solid #48484a;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 12px;
      color: #ebebf5;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      white-space: nowrap;
      z-index: 200;
    }

    #assign-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #assign-toast .t-green  { color: #32d74b; font-weight: 600; }
    #assign-toast .t-blue   { color: #0a84ff; font-weight: 600; }
    #assign-toast .t-orange { color: #ff9f0a; font-weight: 600; }

    /* ── Board ───────────────────────────────────────────────────────────── */

    .board {
      display: flex;
      flex: 1;
      overflow: hidden;
      align-items: stretch;
    }

    /* Inbox sits slightly behind and below the main panel */
    .inbox-section {
      flex-shrink: 0;
      width: 190px;
      position: relative;
      z-index: 1;
      transform: translateY(8px);
      margin-right: -6px;
      filter: brightness(0.88);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition:
        width 400ms cubic-bezier(0.25, 0, 0, 1),
        transform 400ms cubic-bezier(0.25, 0, 0, 1),
        filter 400ms cubic-bezier(0.25, 0, 0, 1);
    }

    /* Main columns panel sits on top, casts shadow left onto inbox */
    .main-section {
      flex: 1;
      display: flex;
      position: relative;
      z-index: 2;
      overflow: hidden;
      box-shadow: -16px 0 32px rgba(0, 0, 0, 0.56), -1px 0 0 rgba(255, 255, 255, 0.04);
      border-left: 1px solid #222224;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2c2c2e;
      overflow: hidden;
      transition: background 0.1s;
      position: relative;
    }

    .col-today { flex: 1.6; }

    .column:last-child { border-right: none; }

    .column.drag-over { background: #2c2c2e; }
    body.is-dragging-from-other .col-inbox { opacity: 0.35; pointer-events: none; }

    .column-header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #2c2c2e;
    }

    .column-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #8e8e93;
    }

    .column-count {
      font-size: 11px;
      color: #48484a;
      margin-left: auto;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .column-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #count-inbox {
      transition:
        color 400ms cubic-bezier(0.25, 0, 0, 1),
        font-size 400ms cubic-bezier(0.25, 0, 0, 1),
        font-weight 400ms cubic-bezier(0.25, 0, 0, 1);
    }

    .col-inbox   .column-indicator { background: #636366; transition: background 400ms cubic-bezier(0.25, 0, 0, 1); }
    .col-someday .column-indicator { background: #636366; }
    .col-next    .column-indicator { background: #0a84ff; }
    .col-today   .column-indicator { background: #ff9f0a; }

    .inbox-unprocessed-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #48484a;
      border: 1px solid #3a3a3c;
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
      transition: color 400ms cubic-bezier(0.25, 0, 0, 1), border-color 400ms cubic-bezier(0.25, 0, 0, 1);
    }

    .col-inbox .cards {
      background-image: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 18px,
        rgba(255, 255, 255, 0.018) 18px,
        rgba(255, 255, 255, 0.018) 19px
      );
    }

    .col-inbox .card {
      background: #272729;
      border-style: dashed;
      border-color: #363638;
    }
    .col-inbox .card:hover { border-color: #48484a; border-style: solid; }
    .col-inbox .card-title { color: #aeaeb2; }

    .inbox-nudge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: #3a3a3c;
      letter-spacing: 0.2px;
      padding: 8px 14px 6px;
      flex-shrink: 0;
      border-bottom: 1px solid #232325;
    }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-track { background: transparent; }
    .cards::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    /* ── Group headers ───────────────────────────────────────────────────── */

    .group-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #48484a;
      padding: 4px 2px;
      border-bottom: 1px solid #2c2c2e;
      margin-top: 8px;
      pointer-events: none;
      user-select: none;
      flex-shrink: 0;
    }

    .group-header:first-child { margin-top: 0; }

    /* ── Cards ───────────────────────────────────────────────────────────── */

    .card {
      background: #2c2c2e;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: grab;
      border: 1px solid #3a3a3c;
      transition: border-color 0.15s, opacity 0.15s, transform 0.1s;
      user-select: none;
      position: relative;
    }

    .card:active { cursor: grabbing; }
    .card:hover { border-color: #48484a; }

    .card.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: #f2f2f7;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .card:not(:has(.chip)) .card-title { margin-bottom: 0; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: #3a3a3c;
      color: #8e8e93;
      letter-spacing: 0.2px;
    }


    .chip-date               { background: #2c2c2e; color: #636366; }
    .chip-deadline           { background: #2c2c2e; color: #636366; }
    .chip-deadline.due-soon  { background: #2e2200; color: #ff9f0a; }
    .chip-deadline.due-today { background: #2e1400; color: #ff6b00; }
    .chip-deadline.overdue   { background: #2e0000; color: #ff453a; }

    .card-separator {
      height: 1px;
      background: #3a3a3c;
      margin: 4px 0;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #48484a;
      font-size: 12px;
      font-style: italic;
    }

    .loading-card {
      background: #2c2c2e;
      border-radius: 10px;
      height: 52px;
      border: 1px solid #3a3a3c;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    /* ── Verdict panel ───────────────────────────────────────────────────── */

    .verdict-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 90px;
      transform: translateX(90px);
      transition: transform 180ms ease-out;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(28,28,30,0.55);
      border-left: 1px solid #3a3a3c;
      display: flex;
      flex-direction: column;
      z-index: 50;
      pointer-events: none;
    }
    .verdict-panel.active {
      transform: translateX(0);
      pointer-events: auto;
    }
    .verdict-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 140ms ease, opacity 140ms ease;
    }
    .verdict-zone .vz-icon {
      font-size: 32px;
      line-height: 1;
      transition: transform 140ms ease;
    }
    .verdict-zone .vz-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .verdict-zone-complete {
      background: rgba(48,209,88,0.09);
      border-bottom: 1px solid #2c2c2e;
    }
    .verdict-zone-complete .vz-icon  { color: #30d158; }
    .verdict-zone-complete .vz-label { color: #30d158; }
    .verdict-zone-cancel {
      background: rgba(255,69,58,0.09);
    }
    .verdict-zone-cancel .vz-icon  { color: #ff453a; }
    .verdict-zone-cancel .vz-label { color: #ff453a; }
    .verdict-zone.hot.verdict-zone-complete { background: rgba(48,209,88,0.30); }
    .verdict-zone.hot.verdict-zone-cancel   { background: rgba(255,69,58,0.30); }
    .verdict-zone.hot .vz-icon { transform: scale(1.15); }
    .verdict-zone.dim { opacity: 0.5; }

    /* ── GTD Briefing overlay ────────────────────────────────────────────── */
    #briefing-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 20px 40px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      overflow-y: auto;
    }
    #briefing-overlay.visible {
      opacity: 1; pointer-events: all;
    }
    #briefing-modal {
      background: #1c1c1e;
      border: 1px solid #3a3a3c;
      border-radius: 18px;
      width: 100%; max-width: 620px;
      flex-shrink: 0;
      transform: translateY(-12px);
      transition: transform 0.25s ease;
      overflow: hidden;
    }
    #briefing-overlay.visible #briefing-modal {
      transform: translateY(0);
    }
    #briefing-modal-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 26px 26px 20px;
      border-bottom: 1px solid #2c2c2e;
    }
    #briefing-modal-header .greeting { font-size: 22px; font-weight: 300; color: #f2f2f7; }
    #briefing-modal-header .greeting strong { font-weight: 600; }
    #briefing-modal-header .date-line { font-size: 12px; color: #636366; margin-top: 3px; }
    #briefing-close {
      background: #2c2c2e; border: 1px solid #3a3a3c; color: #8e8e93;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 16px; font-family: inherit;
    }
    #briefing-close:hover { background: #3a3a3c; color: #f2f2f7; }
    #briefing-body { padding: 20px 26px 26px; display: flex; flex-direction: column; gap: 12px; }
    .b-section { background: #2c2c2e; border-radius: 12px; overflow: hidden; }
    .b-section-header { display: flex; align-items: center; gap: 12px; padding: 15px 18px 13px; }
    .b-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .b-badge-red    { background: #3d1a1a; color: #ff453a; }
    .b-badge-amber  { background: #2e2200; color: #ff9f0a; }
    .b-badge-green  { background: #1a2e1a; color: #30d158; }
    .b-badge-blue   { background: #1a2240; color: #0a84ff; }
    .b-badge-purple { background: #2e1a40; color: #bf5af2; }
    .b-section-title { font-size: 15px; font-weight: 600; flex: 1; }
    .b-section-status { font-size: 13px; font-weight: 500; }
    .b-section-body { padding: 0 18px 15px; }
    .b-metric-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid #3a3a3c; }
    .b-metric-icon { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .b-metric-text { flex: 1; }
    .b-metric-label { font-size: 12px; color: #aeaeb2; }
    .b-metric-value { font-size: 19px; font-weight: 600; line-height: 1.2; }
    .b-action { font-size: 11px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .b-action-red    { background: #3d1a1a; color: #ff453a; }
    .b-action-amber  { background: #2e2200; color: #ff9f0a; }
    .b-action-green  { background: #1a2e1a; color: #30d158; }
    .b-task-list { margin-top: 2px; }
    .b-task-item { font-size: 12px; color: #aeaeb2; padding: 5px 0; border-top: 1px solid #3a3a3c; display: flex; align-items: center; gap: 8px; }
    .b-task-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .b-two { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .b-two .b-metric-row { border-top: none; padding-top: 4px; }
    .b-col-red    { color: #ff453a; }
    .b-col-amber  { color: #ff9f0a; }
    .b-col-green  { color: #30d158; }
    .b-col-blue   { color: #0a84ff; }
    .b-col-cyan   { color: #64d2ff; }
    #briefing-open-btn {
      margin-left: auto;
      background: none; border: 1px solid #3a3a3c; color: #636366;
      padding: 7px 12px; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-size: 12px; display: flex; align-items: center; gap: 5px;
    }
    #briefing-open-btn:hover { background: #2c2c2e; color: #aeaeb2; }

    /* ── View tabs ──────────────────────────────────────────────────── */
    #view-tabs {
      display: flex;
      gap: 2px;
      background: #2c2c2e;
      border-radius: 8px;
      padding: 2px;
      margin-left: 12px;
    }
    .view-tab {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: none;
      color: #8e8e93;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab.active { background: #3a3a3c; color: #f2f2f7; font-weight: 600; }
    .view-tab:hover:not(.active) { color: #aeaeb2; }

    /* ── Focus banner ───────────────────────────────────────────────── */
    #focus-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #1a2e1a;
      border-bottom: 1px solid #30d15840;
      color: #30d158;
      font-size: 13px;
    }
    #focus-banner.visible { display: flex; }
    #focus-banner-change {
      background: none;
      border: 1px solid #30d15840;
      color: #30d158;
      padding: 3px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      margin-left: auto;
    }
    #focus-banner-change:hover { background: #30d15820; }

    /* ── Focus container ────────────────────────────────────────────── */
    #focus-container {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #focus-container.visible { display: flex; }

    /* ── Focus picker ───────────────────────────────────────────────── */
    .focus-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 24px;
      padding: 40px 20px;
    }
    .focus-picker h2 { color: #f2f2f7; font-size: 18px; font-weight: 600; margin: 0; }
    .focus-picker-slots { display: flex; gap: 20px; }
    .focus-picker-slot { display: flex; flex-direction: column; gap: 8px; width: 280px; }
    .focus-picker-slot label {
      color: #8e8e93; font-size: 12px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .focus-picker-search {
      background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px;
      color: #f2f2f7; font-family: inherit; font-size: 14px;
      padding: 8px 12px; width: 100%; box-sizing: border-box;
    }
    .focus-picker-search::placeholder { color: #636366; }
    .focus-picker-search:focus { outline: none; border-color: #30d158; }
    .focus-picker-list {
      max-height: 240px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 2px;
    }
    .focus-picker-option {
      padding: 8px 12px; border-radius: 6px; color: #aeaeb2;
      font-size: 13px; cursor: pointer; transition: background 0.1s, color 0.1s;
    }
    .focus-picker-option:hover { background: #2c2c2e; color: #f2f2f7; }
    .focus-picker-option.selected { background: #1a2e1a; color: #30d158; }
    .focus-picker-start {
      background: #30d158; border: none; border-radius: 8px;
      color: #000; font-family: inherit; font-size: 14px; font-weight: 600;
      padding: 10px 28px; cursor: pointer; transition: opacity 0.15s;
    }
    .focus-picker-start:disabled { opacity: 0.35; cursor: default; }
    .focus-picker-start:not(:disabled):hover { opacity: 0.85; }

    /* ── Focus swimlanes ────────────────────────────────────────────── */
    .focus-swimlanes {
      display: flex; flex: 1; gap: 16px;
      padding: 16px 20px; overflow: hidden;
    }
    .focus-swimlane {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; background: #1c1c1e; border-radius: 10px; overflow: hidden;
    }
    .focus-swimlane-header {
      background: #2c2c2e; border-left: 3px solid #30d158;
      padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .focus-swimlane-name { color: #f2f2f7; font-size: 15px; font-weight: 600; }
    .focus-swimlane-count { color: #30d158; font-size: 12px; font-weight: 500; }
    .focus-cols { display: flex; flex: 1; overflow: hidden; }
    .focus-col {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; border-right: 1px solid #2c2c2e;
    }
    .focus-col:last-child { border-right: none; }
    .focus-col-title {
      color: #636366; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 10px 4px; flex-shrink: 0;
    }
    .focus-col-cards {
      flex: 1; overflow-y: auto; padding: 4px 8px 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .focus-col-cards.drag-over { background: rgba(44,44,46,0.5); }

    .focus-col-empty {
      min-height: 120px; border: 1px dashed #3a3a3c; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #636366; font-size: 12px;
    }

    /* ── Narrow notice ──────────────────────────────────────────────── */
    .focus-narrow-notice {
      display: none; padding: 20px; color: #636366;
      font-size: 13px; text-align: center;
    }
    @media (max-width: 1279px) {
      .focus-narrow-notice { display: block; }
      .focus-swimlanes { display: none !important; }
    }
    /* ── Review (Inbox Triage) ───────────────────────────────────────────── */

    .review-badge {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff453a;
      margin-left: 4px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .review-badge.done { background: #30d158; }

    #review-container {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    #review-header {
      display: flex;
      align-items: center;
      padding: 14px 24px 12px;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;
      gap: 10px;
    }

    #review-title {
      font-size: 17px;
      font-weight: 600;
      color: #f2f2f7;
    }

    #review-exit-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #3a3a3c;
      color: #8e8e93;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 6px;
    }

    #review-exit-btn:hover { color: #f2f2f7; background: #3a3a3c; }

    #review-board {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .review-col {
      flex: 1;
      border-right: 1px solid #2c2c2e;
      display: flex;
      flex-direction: column;
      min-width: 150px;
    }

    .review-col:last-child { border-right: none; }

    .review-col-header {
      padding: 12px 14px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;

    .rcol-inbox   .review-col-header { color: #636366; }
    .rcol-today   .review-col-header { color: #ff9f0a; }
    .rcol-next    .review-col-header { color: #0a84ff; }
    .rcol-someday .review-col-header { color: #8e8e93; }

    .review-col-cards {
      flex: 1;

      padding: 8px;

      flex-direction: column;
      gap: 6px;
    }

    .review-col-cards::-webkit-scrollbar { width: 4px; }
    .review-col-cards::-webkit-scrollbar-track { background: transparent; }
    .review-col-cards::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    .rcard {
      background: #2c2c2e;

      padding: 10px 12px;

      font-size: 11px;

    /* ── Project chip (hover quick-assign) ───────────────────────────────── */

    .proj-chip {
      position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
      font-size: 10px; font-weight: 600; color: #636366;

    .proj-chip:hover { color: #0a84ff; border-color: rgba(10,132,255,0.4); background: #05131f; }

    .proj-picker-panels { display: flex; height: 210px; }
    .proj-picker-left {

    .proj-picker-arrow { font-size: 9px; opacity: 0.4; flex-shrink: 0; }

    .proj-picker-no-heading:hover { background: #2c2c2e; color: #8e8e93; font-style: normal; }
    .proj-picker-hdiv { height: 1px; background: #2c2c2e; margin: 3px 4px 5px; flex-shrink: 0; }
    .proj-picker-heading {

    }

  </style>
</head>
